# Open Design (agentic visual editor) — OPT-IN overlay.
#
# Open Design is optional. The base `docker-compose.yml` boots without it.
# Enable it by layering this file on top:
#
#   docker compose -f docker-compose.yml -f docker-compose.od.yml up -d
#
# Requires OD_API_TOKEN in .env (generate with `openssl rand -hex 32`).
# The image is public: ghcr.io/growth4u-systems/od (override via OPEN_DESIGN_IMAGE).
services:
  sanchocmo:
    depends_on:
      open-design:
        condition: service_healthy
    # Point MC at the daemon only when this overlay is active. The base compose
    # leaves OD_DAEMON_URL empty so isOdConfigured() reports OD off when the
    # overlay isn't layered (no dead "Abrir editor agentic" button).
    #
    # OD_BRAND_ROOT tells MC where the OD daemon SEES the shared brand tree in
    # its own container (the `open-design` service mounts it at /brands below).
    # MC translates the absolute brand path it sends to the daemon
    # (POST /api/import/folder) from its own `/root/.openclaw/...` brandDir into
    # this daemon-visible root — see toDaemonBrandPath in src/lib/open-design.
    # This is an internal container path, NOT a user setting — it is hardcoded to
    # match the /brands mount target below and MUST stay in lockstep with it
    # (overriding one without the other sends the daemon a path it hasn't mounted).
    # Set only here (the overlay); the base compose leaves it unset, so in
    # same-filesystem dev the path passes through unchanged.
    environment:
      - OD_DAEMON_URL=${OD_DAEMON_URL:-http://open-design:7456}
      - OD_BRAND_ROOT=/brands

  open-design:
    image: ${OPEN_DESIGN_IMAGE:-ghcr.io/growth4u-systems/od:edge}
    container_name: open-design
    restart: unless-stopped
    ports:
      # Host side parameterized for port-conflict relocation (compose-env.sh
      # resolve_host_ports); container side stays 7456 (nginx-od upstream assumes it).
      - "127.0.0.1:${OD_HOST_PORT:-7456}:7456"
    environment:
      NODE_ENV: production
      OD_BIND_HOST: 0.0.0.0
      OD_PORT: "7456"
      # Phase 5 hosted-mode safety floor (Growth4U fork ≥ 0.7.0). The
      # daemon refuses to bind 0.0.0.0 without OD_API_TOKEN and rejects
      # every /api/* request lacking `Authorization: Bearer <token>`
      # (loopback peers + health/version/status probes are exempted).
      # Nginx injects the bearer for browser-side traffic so the OD web
      # app keeps working without code changes; MC backend → daemon
      # calls bypass auth because they enter from a loopback peer when
      # the daemon is reached over the compose bridge.
      OD_API_TOKEN: ${OD_API_TOKEN:?OD_API_TOKEN required when OD_BIND_HOST is non-loopback (generate with `openssl rand -hex 32`)}
      # Origins allowed to call the daemon API cross-origin. The MC backend
      # proxies via the compose network so this is only needed for the OD web
      # app served at its public URL — it must list itself plus any embedding
      # origin (the MC public URL embedding it in an iframe).
      OD_ALLOWED_ORIGINS: ${OD_ALLOWED_ORIGINS:-}
      # Growth4U fork bakes the `claude` CLI into the runtime image so the
      # Settings → Local CLI panel surfaces a working agent in cloud mode
      # (upstream desktop installs rely on the user's host `claude` which
      # doesn't exist in a container). Upstream strips ANTHROPIC_API_KEY
      # before spawning `claude` so `claude login` wins on desktop; we opt
      # back in because login is impossible in a headless container and the
      # API key is the only viable auth path. Empty key = CLI still shows
      # up but auth fails on first invocation; that's loud enough to debug.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OD_CLAUDE_PRESERVE_API_KEY: "1"
    volumes:
      - open_design_data:/app/.od
      # Brand files live in MC's workspace. When a user opens the agentic editor,
      # MC calls the daemon's POST /api/import/folder with an absolute `baseDir`
      # (brand-book/visual-identity of the brand). The daemon reads that path from
      # ITS OWN filesystem, so the shared brand tree must be mounted here. Mount
      # the whole brand root once, read-only (the daemon imports a COPY into its
      # data store and must never write brand-book artifacts — the skill owns
      # authoring), so import works for ANY brand slug created at runtime without
      # a per-brand mount.
      #
      # Mounted at /brands (NOT MC's own /root/.openclaw/... path): the daemon
      # runs as a non-root user and cannot traverse the image's /root (mode 700),
      # so the target must be world-traversable. MC rewrites the path it sends to
      # the daemon into this root via OD_BRAND_ROOT (see the sanchocmo env above).
      #
      # This replaces an earlier mount that bind-mounted a single hardcoded
      # `growth4u` brand into `/app/.od/design-systems/growth4u`. That never
      # enabled editing (the daemon refuses to import a folder inside its own data
      # dir: "cannot import the data directory") and only ever covered one
      # G4U-internal brand, so any other slug (product installs) 400'd with
      # "folder not found".
      - ${OPENCLAW_HOME:-~/.openclaw}/workspace-sancho/brand:/brands:ro
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    mem_limit: ${OPEN_DESIGN_MEM_LIMIT:-384m}
    pids_limit: 256
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:7456/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  open_design_data:
