# Open Design daemon — nginx vhost template.
#
# Validated on staging 2026-05-19. See infra/nginx/README.md for what each
# directive is for and how to apply this to a VPS.
#
# Placeholders to fill before deploying:
#   <OD_DOMAIN>      — public FQDN, e.g. od.staging.sanchocmo.ai
#   <OD_API_TOKEN>   — same value as OD_API_TOKEN in the OD container env;
#                      generate with `openssl rand -hex 32`
#
# The certificate paths assume certbot installed the cert at the standard
# Let's Encrypt location; certbot will rewrite the listen/ssl_* lines on its
# first run if you start from a plain HTTP-only block. We keep the post-
# certbot shape here so the file is drop-in for an existing cert.

server {
    server_name <OD_DOMAIN>;

    client_max_body_size 100M;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    location / {
        proxy_pass http://127.0.0.1:7456;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Phase 5 auth — daemon refuses requests without a valid bearer.
        # Token lives server-side in nginx so the browser never sees it.
        proxy_set_header Authorization "Bearer <OD_API_TOKEN>";

        # Phase 5 same-origin guard — browsers omit the Origin header on
        # same-origin GETs (e.g. the Settings → MCP server panel's
        # /api/mcp/install-info). Without an Origin the daemon falls back
        # to a Host check that fails behind a reverse proxy, returning
        # 403. Injecting the public origin server-side makes those GETs
        # pass the guard. Must match OD_ALLOWED_ORIGINS on the daemon.
        proxy_set_header Origin "https://<OD_DOMAIN>";

        proxy_buffering off;
        proxy_cache off;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/<OD_DOMAIN>/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/<OD_DOMAIN>/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = <OD_DOMAIN>) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name <OD_DOMAIN>;
    return 404; # managed by Certbot
}
