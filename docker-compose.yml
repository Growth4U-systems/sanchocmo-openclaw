services:
  sanchocmo:
    build:
      context: .
      args:
        NEXT_PUBLIC_ENV_LABEL: ${NEXT_PUBLIC_ENV_LABEL:-}
        GIT_COMMIT: ${GIT_COMMIT:-}
    container_name: sanchocmo
    restart: unless-stopped
    ports:
      - "127.0.0.1:18789:18789"
      - "127.0.0.1:18790:18790"
      - "127.0.0.1:3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${OPENCLAW_HOME:-~/.openclaw}:/root/.openclaw
      - ${SNAPSHOT_DATA_DIR:-/mnt/data/snapshots}:/mnt/data/snapshots
    env_file:
      - .env
    environment:
      - OPENCLAW_HOME=/root/.openclaw
      - MC_BIND_ADDRESS=0.0.0.0
      - MC_WORKSPACE=/root/.openclaw/workspace-sancho
      - LEGACY_PORT=18790
      # Tasks backend: "json" (default), "db-shadow" or "db".
      # When "db" or "db-shadow", DATABASE_URL must point at a Neon DB
      # with the migrations in src/db/migrations applied.
      - MC_TASKS_BACKEND=${MC_TASKS_BACKEND:-json}
      - MC_TASKS_WORKSPACE=${MC_TASKS_WORKSPACE:-workspace-sancho}
      - DATABASE_URL=${DATABASE_URL:-}
      # Open Design (agentic editor): daemonUrl is server-to-server via the
      # compose network; webUrl is the public URL the browser loads in the
      # iframe / new tab. Both end at the same `open-design` container.
      # OD_API_TOKEN is shared with the daemon — MC injects it as Bearer +
      # spoofs `Origin: ${OD_WEB_URL}` so writes (e.g. PUT /api/app-config)
      # pass the fork's Phase 5 auth + same-origin guard.
      - OD_DAEMON_URL=${OD_DAEMON_URL:-http://open-design:7456}
      - OD_WEB_URL=${OD_WEB_URL:-}
      - OD_API_TOKEN=${OD_API_TOKEN:-}
      # The bundled `notion` skill reads NOTION_API_TOKEN, but `.env` ships the
      # key as NOTION_API_KEY (the name the meeting-intelligence flow + the
      # admin api-health check expect). Alias the two so `ntn` and the skill's
      # curl examples both authenticate against the same Notion integration
      # without forcing every agent to remember to re-export.
      - NOTION_API_TOKEN=${NOTION_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18789/healthz"]
      # Tight interval + generous start_period so `docker compose up --wait`
      # in the deploy workflow marks the container healthy within ~10s of the
      # app being ready (instead of waiting up to a full 60s interval),
      # minimizing the user-visible gap between old-container stop and
      # new-container readiness.
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  open-design:
    image: ${OPEN_DESIGN_IMAGE:-ghcr.io/growth4u-systems/od:edge}
    container_name: open-design
    restart: unless-stopped
    ports:
      - "127.0.0.1:7456:7456"
    environment:
      NODE_ENV: production
      OD_BIND_HOST: 0.0.0.0
      OD_PORT: "7456"
      # Phase 5 hosted-mode safety floor (Growth4U fork ≥ 0.7.0). The
      # daemon refuses to bind 0.0.0.0 without OD_API_TOKEN and rejects
      # every /api/* request lacking `Authorization: Bearer <token>`
      # (loopback peers + health/version/status probes are exempted).
      # Nginx injects the bearer for browser-side traffic so the OD web
      # app keeps working without code changes; MC backend → daemon
      # calls bypass auth because they enter from a loopback peer when
      # the daemon is reached over the compose bridge.
      OD_API_TOKEN: ${OD_API_TOKEN:?OD_API_TOKEN required when OD_BIND_HOST is non-loopback (generate with `openssl rand -hex 32`)}
      # Origins allowed to call the daemon API cross-origin. The MC backend
      # proxies via the compose network so this is only needed for the OD web
      # app served at its public URL — it must list itself plus any embedding
      # origin (the MC public URL embedding it in an iframe).
      OD_ALLOWED_ORIGINS: ${OD_ALLOWED_ORIGINS:-}
      # Growth4U fork bakes the `claude` CLI into the runtime image so the
      # Settings → Local CLI panel surfaces a working agent in cloud mode
      # (upstream desktop installs rely on the user's host `claude` which
      # doesn't exist in a container). Upstream strips ANTHROPIC_API_KEY
      # before spawning `claude` so `claude login` wins on desktop; we opt
      # back in because login is impossible in a headless container and the
      # API key is the only viable auth path. Empty key = CLI still shows
      # up but auth fails on first invocation; that's loud enough to debug.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OD_CLAUDE_PRESERVE_API_KEY: "1"
    volumes:
      - open_design_data:/app/.od
      # Brand design systems live in MC's workspace as the output of Sancho's
      # visual-identity skill. We expose each brand's `brand-book/visual-identity`
      # directory as a "user" design system to OD by bind-mounting it into
      # `/app/.od/design-systems/<slug>` (the dir the daemon scans). Read-only
      # because the daemon must never write to brand-book artifacts — the
      # skill owns authoring. Add one mount per brand that has authored
      # DESIGN.md. Brands without one stay invisible to OD.
      - ${OPENCLAW_HOME:-~/.openclaw}/workspace-sancho/brand/growth4u/brand-book/visual-identity:/app/.od/design-systems/growth4u:ro
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    mem_limit: ${OPEN_DESIGN_MEM_LIMIT:-384m}
    pids_limit: 256
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:7456/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  open_design_data:
