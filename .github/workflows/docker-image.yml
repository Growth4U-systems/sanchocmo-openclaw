name: Publish sanchocmo image

# Builds and pushes the public, versioned core image so the product can
# `docker compose pull` instead of cloning + building from source (Fase 5,
# GAP F1/F2/F4). Mirror of the OD/YALC `docker-image.yml` workflows.
#
#   • release: published   → :vX.Y.Z + :latest   (hooks into release-please)
#   • workflow_dispatch     → :<input>            (default :edge, for private tests)
#
# We DON'T build on every push to staging: the multi-arch (amd64 + arm64) build
# runs the arm64 leg under QEMU emulation (~15-20 min) and is billed per-minute
# on this private repo. Staging never consumed that image anyway — deploy-staging
# builds `sanchocmo` from source on the VPS (it has a compose `build:` directive),
# and docker-compose.yml defaults to `:latest`, not `:edge`. So the image is only
# needed for a real production release (multi-arch, versioned) or an on-demand
# test build via workflow_dispatch. See docs/plans/sanchocmo-packaging-plan.md.
#
# NOTE: the GHCR package starts PRIVATE. Making it public is gated on Fase 0
# (secret + client-data purge) — until then this still works for VPS/CI hosts
# that authenticate to GHCR. See docs/plans/sanchocmo-packaging-plan.md.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (manual runs)"
        default: edge

# One in-flight build per ref; a newer trigger supersedes an older one.
concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/growth4u-systems/sanchocmo

jobs:
  publish:
    name: Build & push (multi-arch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # .dockerignore (not .gitignore) keeps per-instance data/runtime out
          # of the baked framework seed — see Dockerfile §"Bake the OpenClaw home".
          # amd64-only: building arm64 here means QEMU emulation of `npm ci` +
          # `next build`, which alone pushed every build past ~40 min. Native
          # arm64 runners (`ubuntu-24.04-arm`) need a Team plan on a private repo;
          # re-enable multi-arch (ideally via a matrix of native runners) once the
          # repo is public or the plan supports them. No ARM consumers yet.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
          # Registry cache (not gha): the GitHub Actions cache is capped at 10 GB
          # per repo, and a ~2.7 GB image with mode=max blows past it, so entries
          # get evicted between runs and every build starts cold. A registry-backed
          # cache has no such cap and isn't branch-scoped, so the layers actually
          # persist across runs (warm builds reuse npm ci + next build). gha kept
          # as a fallback.
          cache-from: |
            type=registry,ref=ghcr.io/growth4u-systems/sanchocmo:buildcache
            type=gha
          cache-to: |
            type=registry,ref=ghcr.io/growth4u-systems/sanchocmo:buildcache,mode=max
            type=gha,mode=max
