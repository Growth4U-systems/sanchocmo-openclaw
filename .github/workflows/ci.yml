name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '26'

jobs:
  verify:
    name: Typecheck + Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: growie_ci
          POSTGRES_PASSWORD: growie_ci
          POSTGRES_DB: growie_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U growie_ci -d growie_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Validate required agent-run migration
        run: npm run db:migrate:agent-runs:check

      # Gates the src/lib unit tests (tsx --test) so tool-registry goldens and
      # other lib invariants can't silently rot (SAN-285). Runs before Build for
      # fast feedback. Kept in this job (not renamed) so the required-check name
      # "Typecheck + Build" stays valid for branch protection.
      - name: Lib tests
        env:
          AGENT_RUNS_TEST_DATABASE_URL: postgresql://growie_ci:growie_ci@127.0.0.1:5432/growie_ci
        run: npm run test:lib

      # The Mission Control bridge is part of the same user-visible execution
      # path as Growie. Keep its contract tests in the required check instead
      # of allowing the plugin to drift outside CI.
      - name: Mission Control plugin tests
        run: npm run test:plugins

      # Product definitions are executable governance: missing source/tests,
      # ambiguous routes or an overdue approved definition must fail closed.
      - name: Product capability drift
        run: npm run check:product-capabilities

      - name: Build
        env:
          # Build-time stubs. Production values come from VPS .env at runtime.
          DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
          NEXTAUTH_SECRET: stub-secret-for-ci-build-only
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_ENV_LABEL: ci
        run: npm run build

      # A production build can succeed while auth redirects or the top-level
      # dashboard fail at runtime. Exercise the compiled app before allowing a
      # support/observability change onto the trunk.
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Browser smoke tests
        env:
          DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
          NEXTAUTH_SECRET: stub-secret-for-ci-e2e-only
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_ENV_LABEL: ci
        run: npm run test:e2e

  # NOTE: lint runs as a local pre-push hook (.husky/pre-push) to save CI
  # Actions minutes. It was already `continue-on-error` here (non-blocking),
  # so moving it out of CI loses no enforcement — only cost.

  verify-scripts:
    name: Scripts unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run unit tests
        run: python3 -m unittest discover -s scripts -p 'test_*.py' -v

  # Los tests del installer (bash puro, sin deps) existían desde v1.0.0 pero no
  # los corría nadie: wizard.test.sh llevaba meses roto en main sin que se viera,
  # y con él quedaron sin ejecutar nunca los casos que después destaparon SAN-457
  # y SAN-458. Un test que no corre se pudre callado. (SAN-456)
  verify-installer:
    name: Installer tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # El caso interactivo del wizard levanta un pty con python3.
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run installer tests
        run: |
          rc=0
          for t in tests/installer/*.test.sh; do
            echo "::group::$t"
            # Sin `set -e`: corremos TODOS y reportamos al final, así un fallo no
            # esconde el estado de los demás.
            if bash "$t"; then echo "PASS  $t"; else echo "FAIL  $t"; rc=1; fi
            echo "::endgroup::"
          done
          exit "$rc"
