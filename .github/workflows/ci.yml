name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '26'

jobs:
  verify:
    name: Typecheck + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # Gates the src/lib unit tests (tsx --test) so tool-registry goldens and
      # other lib invariants can't silently rot (SAN-285). Runs before Build for
      # fast feedback. Kept in this job (not renamed) so the required-check name
      # "Typecheck + Build" stays valid for branch protection.
      - name: Lib tests
        run: npm run test:lib

      - name: Build
        env:
          # Build-time stubs. Production values come from VPS .env at runtime.
          DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
          NEXTAUTH_SECRET: stub-secret-for-ci-build-only
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_ENV_LABEL: ci
        run: npm run build

  # NOTE: lint runs as a local pre-push hook (.husky/pre-push) to save CI
  # Actions minutes. It was already `continue-on-error` here (non-blocking),
  # so moving it out of CI loses no enforcement — only cost.

  verify-scripts:
    name: Scripts unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run unit tests
        run: python3 -m unittest discover -s scripts -p 'test_*.py' -v

  # Los tests del installer (bash puro, sin deps) existían desde v1.0.0 pero no
  # los corría nadie: wizard.test.sh llevaba meses roto en main sin que se viera,
  # y con él quedaron sin ejecutar nunca los casos que después destaparon SAN-457
  # y SAN-458. Un test que no corre se pudre callado. (SAN-456)
  verify-installer:
    name: Installer tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # El caso interactivo del wizard levanta un pty con python3.
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run installer tests
        run: |
          rc=0
          for t in tests/installer/*.test.sh; do
            echo "::group::$t"
            # Sin `set -e`: corremos TODOS y reportamos al final, así un fallo no
            # esconde el estado de los demás.
            if bash "$t"; then echo "PASS  $t"; else echo "FAIL  $t"; rc=1; fi
            echo "::endgroup::"
          done
          exit "$rc"
