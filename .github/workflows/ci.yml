name: CI

on:
  pull_request:
    branches: [staging, main]
  push:
    branches: [staging, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'

jobs:
  verify:
    name: Typecheck + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        env:
          # Build-time stubs. Production values come from VPS .env at runtime.
          DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
          NEXTAUTH_SECRET: stub-secret-for-ci-build-only
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_ENV_LABEL: ci
        run: npm run build

  # NOTE: lint runs as a local pre-push hook (.husky/pre-push) to save CI
  # Actions minutes. It was already `continue-on-error` here (non-blocking),
  # so moving it out of CI loses no enforcement — only cost.

  verify-scripts:
    name: Scripts unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run unit tests
        run: python3 -m unittest discover -s scripts -p 'test_*.py' -v
