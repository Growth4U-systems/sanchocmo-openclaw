name: PR title

# The squash-merge commit that lands on `staging` takes its message from the PR
# title, and release-please reads those Conventional Commits to compute the next
# version. A non-conventional PR title therefore silently breaks versioning. This
# check lints the PR title with the same commitlint config as the commit-msg hook
# (commitlint.config.cjs), so the title that becomes the squash commit is valid.

on:
  pull_request:
    branches: [staging, main]
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  conventional-pr-title:
    name: Conventional PR title
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - run: npm ci

      - name: Lint PR title (feeds the squash commit + release-please)
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: echo "$PR_TITLE" | npx --no-install commitlint --config commitlint.config.cjs
