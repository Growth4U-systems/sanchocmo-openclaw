name: Sync release to staging

# After a production release, release-please bumps the version files
# (.release-please-manifest.json, CHANGELOG.md, package.json, lock) on
# `main` only. `staging` stays on the old version, so the NEXT
# `staging → main` promotion conflicts on those files every time.
#
# This job copies ONLY those version files from `main` onto a branch off
# `staging` and opens a PR. It is a targeted file copy — not a full
# `main → staging` merge — so it never hits the version-file merge
# conflict (which a plain merge would). Code is untouched.
#
# Runs from the default branch (`staging`) on the `release` event.

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync version files main → staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: staging
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Copy version files from main and open PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          TAG: ${{ github.event.release.tag_name || 'manual' }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main

          FILES=".release-please-manifest.json CHANGELOG.md package.json package-lock.json"
          BRANCH="sync/release-${TAG}-to-staging"
          git checkout -B "$BRANCH" origin/staging

          # release-please owns these two wholesale (staging never edits them),
          # so a straight copy from main is correct.
          git checkout origin/main -- .release-please-manifest.json CHANGELOG.md

          # package.json / package-lock.json: sync ONLY the version field. A
          # wholesale `git checkout origin/main -- package.json` regresses
          # staging-only changes that main hasn't released yet — it once dropped
          # the db:migrate:* scripts and broke the staging deploy (SAN-143).
          MAIN_VERSION="$(git show origin/main:package.json | jq -r '.version')"
          npm version "$MAIN_VERSION" --no-git-tag-version --allow-same-version --ignore-scripts

          if git diff --cached --quiet && git diff --quiet; then
            echo "staging version files already match main — nothing to sync."
            exit 0
          fi

          git add $FILES
          git commit -m "chore: sync release ${TAG} version files to staging"
          git push -f origin "$BRANCH"

          num=$(gh pr list --base staging --head "$BRANCH" --state open --json number -q '.[0].number // empty')
          if [ -z "$num" ]; then
            gh pr create --base staging --head "$BRANCH" \
              --title "chore: sync release ${TAG} version files to staging" \
              --body "Automated post-release sync. Copies ONLY the release-please version files (\`.release-please-manifest.json\`, \`CHANGELOG.md\`, \`package.json\`, \`package-lock.json\`) from \`main\` onto \`staging\`, so the next \`staging → main\` promotion doesn't conflict on version files. No code changes — targeted file copy, conflict-free."
            num=$(gh pr list --base staging --head "$BRANCH" --state open --json number -q '.[0].number')
          fi
          echo "Sync PR: #$num"
          gh pr merge "$num" --squash --auto \
            && echo "Auto-merge enabled on PR #$num" \
            || echo "::notice::Sync PR #$num is open — merge it (squash)."
