name: Deploy to Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy (e.g. v1.2.3)'
        required: true

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ github.event.release.tag_name || inputs.tag }} to prod VPS
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.HEALTH_URL }}
    steps:
      - name: Resolve target tag
        id: tag
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Deploying tag: $TAG"

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '~/.openclaw' }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          ssh "$VPS_USER@$VPS_HOST" bash -s <<EOF
            set -euo pipefail
            cd "$DEPLOY_PATH"
            echo "▶ Fetching tags…"
            git fetch --tags --prune
            echo "▶ Checking out $TAG…"
            git checkout "$TAG"
            echo "▶ Building and starting containers…"
            docker compose build --pull
            docker compose up -d
            docker compose ps
          EOF

      - name: Health check
        env:
          HEALTH_URL: ${{ vars.HEALTH_URL }}
        run: |
          if [ -z "$HEALTH_URL" ]; then
            echo "::warning::HEALTH_URL variable not set on production environment; skipping health check"
            exit 0
          fi
          echo "▶ Polling $HEALTH_URL (up to 60s)…"
          for i in {1..30}; do
            if curl -fsS --max-time 5 "$HEALTH_URL" > /dev/null; then
              echo "✓ Health check passed"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Health check failed after 60s"
          exit 1

      - name: Rollback on failure
        if: failure() && steps.tag.outcome == 'success'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '~/.openclaw' }}
        run: |
          echo "::warning::Deploy failed. Attempting rollback to previous tag…"
          ssh "$VPS_USER@$VPS_HOST" bash -s <<'EOF'
            set -euo pipefail
            cd "$DEPLOY_PATH"
            PREV=$(git tag --sort=-creatordate | sed -n '2p')
            if [ -z "$PREV" ]; then
              echo "No previous tag found; cannot rollback"
              exit 1
            fi
            echo "▶ Rolling back to $PREV"
            git checkout "$PREV"
            docker compose up -d
          EOF
