name: Deploy to Production

# Prod deploy is a deliberate MANUAL step — `workflow_dispatch` only. Publishing a
# release does NOT deploy prod (that only cuts the tag/Release, builds the image and
# fast-forwards `main`). Shipping to prod is the human go/no-go: dispatch this with the
# tag. The tag MUST be a release-please Release (enforced by the guard job below) — a
# hand-created tag is not deployable. This keeps a single tagging path (SAN-430).
#
# Picking the version (SAN-450): GitHub can't populate a `type: choice` input from
# the Releases API — dispatch inputs are static YAML — so there is no native version
# dropdown. Instead: leave `tag` empty to ship the latest published Release (the
# common case), or run `npm run deploy:prod` locally to pick an older one from a
# real list. Typing a tag by hand still works and is still guarded below.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to deploy (e.g. v1.2.3). Leave EMPTY to ship the latest published Release."
        required: false

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ inputs.tag || 'latest release' }} to prod VPS
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.HEALTH_URL }}
    steps:
      # `workflow_dispatch` always shows a "Use workflow from <ref>" picker and it
      # cannot be hidden. It doesn't change WHAT ships (the VPS checks out $TAG
      # below), but it does decide which copy of THIS FILE and of
      # scripts/upsert-env.py runs — so a dispatch from a feature branch would
      # deploy a legit tag using that branch's unreviewed deploy logic. The deploy
      # procedure must come from the trunk. (SAN-450)
      - name: Guard — dispatch must come from main
        if: github.ref != 'refs/heads/main'
        run: |
          echo "::error::Dispatched from '${{ github.ref_name }}'. Prod deploys run the workflow file from the trunk only — re-run with 'Use workflow from' set to main (or use \`npm run deploy:prod\`, which pins --ref main). Note this picker selects the DEPLOY LOGIC, not the version: choose the version with the 'tag' input."
          exit 1

      - name: Checkout (need scripts/upsert-env.py for scp)
        uses: actions/checkout@v7

      # An empty `tag` input means "ship the newest thing we cut" — the common case,
      # and the one where hand-typing a version is pure risk for zero benefit.
      # `gh release view` (no tag arg) returns the latest *published Release*, which
      # is exactly the set the guard below accepts — so the default can never be a
      # hand-cut tag that has no Release (v1.0.6/7/8 exist as tags but aren't
      # deployable). (SAN-450)
      - name: Resolve target tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          TAG="$INPUT_TAG"
          if [ -z "$TAG" ]; then
            echo "▶ No tag given — resolving the latest published Release…"
            TAG=$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName -q .tagName)
            if [ -z "$TAG" ]; then
              echo "::error::No published Release found to deploy. Merge the open 'chore: release vX.Y.Z' PR on main to cut one first."
              exit 1
            fi
            echo "✓ Latest published Release is '$TAG'"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Deploying tag: $TAG"
          # /commits/<ref> dereferences annotated tags for us, so this is the
          # commit either way. It's what the image bakes as GIT_COMMIT at build
          # time and what `git rev-parse HEAD` yields after the VPS checks the tag
          # out — i.e. the same value in both deploy modes. (SAN-455)
          COMMIT=$(gh api "repos/$GITHUB_REPOSITORY/commits/$TAG" -q .sha)
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          echo "Expected commit: $COMMIT"

      # Single tagging path (SAN-430): only tags cut by release-please — i.e. tags
      # that have a *published GitHub Release* — are deployable. A hand-created tag
      # "exists" (so `git checkout` would succeed on the VPS) but has no Release; it
      # would ship prod off a version that has no image/tarball and never promoted
      # `main`. Refuse it here, before we touch the VPS.
      - name: Guard — tag must be a published Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::'$TAG' is not a published GitHub Release. Prod only deploys release-please tags. Do NOT create tags by hand — merge the release PR on main to cut a real release, then dispatch this workflow with that tag."
            exit 1
          fi
          echo "✓ '$TAG' is a published Release — cleared to deploy."

      # In image mode the tag is no longer sufficient on its own: `docker-image.yml`
      # only starts on `release: published` and takes minutes to push a multi-arch
      # manifest, so "merge the release PR, then deploy" races it. Prod builds its
      # own source today, which is why this race doesn't exist yet. Wait for the
      # image rather than failing the operator's dispatch, and only then touch the
      # VPS. (SAN-455)
      - name: Guard — the release image must exist (image mode only)
        if: vars.DEPLOY_FROM_IMAGE == '1'
        env:
          IMAGE: ghcr.io/growth4u-systems/sanchocmo:${{ steps.tag.outputs.tag }}
        run: |
          echo "▶ Waiting for $IMAGE (up to 10 min)…"
          for i in $(seq 1 30); do
            if docker manifest inspect "$IMAGE" >/dev/null 2>&1; then
              echo "✓ $IMAGE is published — cleared to deploy."
              exit 0
            fi
            echo "  … not published yet (${i}/30); the release image build may still be running."
            sleep 20
          done
          echo "::error::$IMAGE never appeared. Check the 'Publish sanchocmo image' workflow for this release — it runs on 'release: published'. Re-dispatch once it's green, or unset DEPLOY_FROM_IMAGE on the production Environment to deploy by building on the VPS."
          exit 1

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      # The rollback target is "whatever prod was serving before we touched it" —
      # so read it off the box BEFORE the checkout, while it's still true. The old
      # rollback instead guessed it as "newest tag that isn't the failed one",
      # which is wrong twice: it ignores which version was actually running (a
      # deliberate redeploy of an older tag would "roll back" forward), and
      # `git tag` includes hand-cut tags that were never Releases — the exact
      # thing SAN-430 refuses to deploy. (SAN-454)
      - name: Capture the version prod is running (rollback target)
        id: current
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '~/.openclaw' }}
        run: |
          # Prefer the exact tag (prod is normally detached at one); fall back to
          # the raw SHA, which still rolls the tree back — the image pin just
          # can't apply, and the rollback falls back to building.
          CUR=$(ssh "$VPS_USER@$VPS_HOST" "cd $DEPLOY_PATH && (git describe --tags --exact-match 2>/dev/null || git rev-parse HEAD)" | tr -d '[:space:]')
          if [ -z "$CUR" ]; then
            echo "::warning::Could not read the currently-deployed ref; rollback will be unavailable."
          else
            echo "✓ Prod is currently running: $CUR"
          fi
          echo "ref=$CUR" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        env:
          # ── Deploy infra ──────────────────────────────────────────────
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '~/.openclaw' }}
          TAG: ${{ steps.tag.outputs.tag }}
          ENABLE_YALC_SERVICE: ${{ vars.ENABLE_YALC_SERVICE || '1' }}
          ENABLE_OD_SERVICE: ${{ vars.ENABLE_OD_SERVICE || '1' }}
          RUN_DB_MIGRATIONS: ${{ vars.RUN_DB_MIGRATIONS }}
          # YALC ships as a public GHCR image (SAN-135). Override the tag here
          # to pin a version; empty falls back to the compose default (:edge).
          YALC_IMAGE: ${{ vars.YALC_IMAGE }}
          # SAN-455: set DEPLOY_FROM_IMAGE=1 on the Environment to ship the image CI
          # built for this tag instead of rebuilding it on the VPS. Unset → source
          # build (today's behaviour). SANCHOCMO_IMAGE is only computed in image
          # mode; empty otherwise, so the payload builder filters it out and nothing
          # is pinned in `.env`.
          DEPLOY_FROM_IMAGE: ${{ vars.DEPLOY_FROM_IMAGE || '0' }}
          SANCHOCMO_IMAGE: ${{ vars.DEPLOY_FROM_IMAGE == '1' && format('ghcr.io/growth4u-systems/sanchocmo:{0}', steps.tag.outputs.tag) || '' }}
          # ── Tier 1 — Auth & infra secrets ─────────────────────────────
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          OD_API_TOKEN: ${{ secrets.OD_API_TOKEN }}
          OPENCLAW_GATEWAY_TOKEN: ${{ secrets.OPENCLAW_GATEWAY_TOKEN }}
          MC_CHAT_SECRET: ${{ secrets.MC_CHAT_SECRET }}
          GTM_OS_API_TOKEN: ${{ secrets.GTM_OS_API_TOKEN }}
          YALC_API_TOKEN: ${{ secrets.YALC_API_TOKEN }}
          SANCHO_REPLY_WEBHOOK_TOKEN: ${{ secrets.SANCHO_REPLY_WEBHOOK_TOKEN }}
          YALC_REPO_TOKEN: ${{ secrets.YALC_REPO_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          SLACK_CLIENT_ID: ${{ secrets.SLACK_CLIENT_ID }}
          SLACK_CLIENT_SECRET: ${{ secrets.SLACK_CLIENT_SECRET }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          # ── Tier 2 — System APIs ──────────────────────────────────────
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
          FIREWORKS_ACCOUNT_ID: ${{ secrets.FIREWORKS_ACCOUNT_ID || vars.FIREWORKS_ACCOUNT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          APIFY_API_KEY: ${{ secrets.APIFY_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          FAL_API_KEY: ${{ secrets.FAL_API_KEY }}
          WAVESPEED_API_KEY: ${{ secrets.WAVESPEED_API_KEY }}
          DUMPLING_API_KEY: ${{ secrets.DUMPLING_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          LLM_USAGE_SLACK_BOT_TOKEN: ${{ secrets.LLM_USAGE_SLACK_BOT_TOKEN || vars.LLM_USAGE_SLACK_BOT_TOKEN }}
          LLM_USAGE_SLACK_CHANNEL: ${{ vars.LLM_USAGE_SLACK_CHANNEL || 'C0AHWST8Y5C' }}
          LLM_USAGE_SLACK_REPORT_HOUR: ${{ vars.LLM_USAGE_SLACK_REPORT_HOUR || '9' }}
          LLM_USAGE_SLACK_REPORT_MINUTE: ${{ vars.LLM_USAGE_SLACK_REPORT_MINUTE || '0' }}
          LLM_USAGE_SLACK_REPORT_TIMEZONE: ${{ vars.LLM_USAGE_SLACK_REPORT_TIMEZONE || 'Europe/Madrid' }}
          LLM_USAGE_SLACK_REPORT_ENABLED: ${{ vars.LLM_USAGE_SLACK_REPORT_ENABLED || '1' }}
          LLM_USAGE_SLACK_REQUIRE_BILLING: ${{ vars.LLM_USAGE_SLACK_REQUIRE_BILLING || '0' }}
          LLM_USAGE_SLACK_EXPECTED_BOT: ${{ vars.LLM_USAGE_SLACK_EXPECTED_BOT || 'SanchoCMO' }}
          LLM_USAGE_SLACK_ALLOW_DEFAULT_TOKEN: ${{ vars.LLM_USAGE_SLACK_ALLOW_DEFAULT_TOKEN || '1' }}
          LLM_USAGE_USD_TO_EUR: ${{ vars.LLM_USAGE_USD_TO_EUR || '0.92' }}
          INSTANTLY_API_KEY: ${{ secrets.INSTANTLY_API_KEY }}
          METRICOOL_API_KEY: ${{ secrets.METRICOOL_API_KEY }}
          SANCHO_INTERNAL_API_TOKEN: ${{ secrets.SANCHO_INTERNAL_API_TOKEN }}
          SANCHO_DOCS_ASSISTANT_TOKEN: ${{ secrets.SANCHO_DOCS_ASSISTANT_TOKEN }}
          SANCHO_MCP_TOKENS: ${{ secrets.SANCHO_MCP_TOKENS }}
          # ── Tier 3 — Skill APIs ───────────────────────────────────────
          APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
          GHL_API_KEY: ${{ secrets.GHL_API_KEY }}
          GHL_LOCATION_ID: ${{ secrets.GHL_LOCATION_ID }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
          # UNIPILE_API_KEY / UNIPILE_DSN are intentionally NOT injected here:
          # they are YALC provider credentials managed from the Sancho UI, which
          # writes them to YALC's own key store (a persistent volume). Injecting
          # them from secrets would override the UI choice on every deploy (the
          # container env wins over the key store at boot). Sancho has no direct
          # consumer of these vars — only YALC reads them. (SAN-36)
          DATAFORSEO_API_KEY: ${{ secrets.DATAFORSEO_API_KEY }}
          # ── R2 / Supabase / Cloudflare / Apify (secrets que vivían solo en el VPS) ──
          R2_UPLOAD_IMAGE_ACCESS_KEY_ID: ${{ secrets.R2_UPLOAD_IMAGE_ACCESS_KEY_ID }}
          R2_UPLOAD_IMAGE_SECRET_ACCESS_KEY: ${{ secrets.R2_UPLOAD_IMAGE_SECRET_ACCESS_KEY }}
          R2_UPLOAD_IMAGE_BUCKET_NAME: ${{ secrets.R2_UPLOAD_IMAGE_BUCKET_NAME || vars.R2_UPLOAD_IMAGE_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL || vars.R2_PUBLIC_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          # ── Variables (non-sensitive config) ─────────────────────────
          BASE_URL: ${{ vars.BASE_URL }}
          NEXT_PUBLIC_ENV_LABEL: ${{ vars.NEXT_PUBLIC_ENV_LABEL }}
          NEXTAUTH_URL: ${{ vars.NEXTAUTH_URL }}
          OD_WEB_URL: ${{ vars.OD_WEB_URL }}
          OD_ALLOWED_ORIGINS: ${{ vars.OD_ALLOWED_ORIGINS }}
          OPEN_DESIGN_IMAGE: ${{ vars.OPEN_DESIGN_IMAGE }}
          MC_CHAT_GATEWAY: ${{ vars.MC_CHAT_GATEWAY }}
          SLACK_REDIRECT_URI: ${{ vars.SLACK_REDIRECT_URI }}
          ANTHROPIC_AUTH_MODE: ${{ vars.ANTHROPIC_AUTH_MODE }}
          OPENAI_AUTH_MODE: ${{ vars.OPENAI_AUTH_MODE }}
          ADMIN_EMAIL_DOMAIN: ${{ vars.ADMIN_EMAIL_DOMAIN }}
          ADMIN_IDENTITY_EMAIL: ${{ vars.ADMIN_IDENTITY_EMAIL }}
          # Managed Hermes runtime. Official images include this pinned CLI;
          # these values also make source builds and first activation deterministic.
          INSTALL_HERMES: "1"
          HERMES_AGENT_REF: v2026.7.7.2
          HERMES_CLI: hermes
          HERMES_CLI_PROVIDER: ${{ vars.HERMES_CLI_PROVIDER || 'anthropic' }}
          HERMES_CLI_MODEL: ${{ vars.HERMES_CLI_MODEL || 'claude-sonnet-4-6' }}
          HERMES_WORKDIR: /root/.openclaw
          # Force the Neon HTTP driver in G4U deploys (belt over the runtime's
          # *.neon.tech auto-detect) so prod can never fall back to the
          # vanilla-Postgres driver used by the bundled local-db.
          DATABASE_DRIVER: neon
          SANCHO_MCP_AUDIT_BACKEND: ${{ vars.SANCHO_MCP_AUDIT_BACKEND }}
          SANCHO_MCP_AUDIT_FAIL_CLOSED: ${{ vars.SANCHO_MCP_AUDIT_FAIL_CLOSED }}
          SANCHO_MCP_AUDIT_FILE: ${{ vars.SANCHO_MCP_AUDIT_FILE }}
          # Sancho->YALC runtime URL inside the compose network. Default avoids the
          # client.ts localhost:3847 fallback that left the cockpit stuck on "Checking".
          YALC_BASE_URL: ${{ vars.YALC_BASE_URL || 'http://yalc:3847' }}
          # YALC->Sancho reply callback URL inside the compose network.
          SANCHO_REPLY_WEBHOOK_URL: ${{ vars.SANCHO_REPLY_WEBHOOK_URL || 'http://sanchocmo:3000/api/yalc/replies' }}
        run: |
          # Build payload identically to deploy-staging.yml — same key list.
          # Empty secrets/vars are filtered out so an under-populated
          # `production` Environment is a safe no-op.
          PAYLOAD_B64=$(python3 - <<'PY'
          import os, json, base64
          KEYS = [
              # Tier 1 — Auth & infra
              "NEXTAUTH_SECRET", "ENCRYPTION_KEY", "DATABASE_URL",
              "GOOGLE_CLIENT_ID", "GOOGLE_CLIENT_SECRET",
              "OD_API_TOKEN", "OPENCLAW_GATEWAY_TOKEN", "MC_CHAT_SECRET", "GTM_OS_API_TOKEN",
              "YALC_API_TOKEN", "SANCHO_REPLY_WEBHOOK_TOKEN", "CLAUDE_CODE_OAUTH_TOKEN",
              "SLACK_CLIENT_ID", "SLACK_CLIENT_SECRET", "SLACK_SIGNING_SECRET",
              # Tier 2 — System APIs
              "ANTHROPIC_API_KEY", "OPENROUTER_API_KEY", "FIREWORKS_API_KEY", "FIREWORKS_ACCOUNT_ID",
              "OPENAI_API_KEY", "GEMINI_API_KEY", "XAI_API_KEY", "MINIMAX_API_KEY",
              "BRAVE_API_KEY", "APIFY_API_KEY",
              "FIRECRAWL_API_KEY", "SERPER_API_KEY", "DATAFORSEO_LOGIN", "DATAFORSEO_PASSWORD",
              "NOTION_API_KEY", "FAL_API_KEY",
              "WAVESPEED_API_KEY", "DUMPLING_API_KEY", "SLACK_BOT_TOKEN", "LLM_USAGE_SLACK_BOT_TOKEN",
              "LLM_USAGE_SLACK_CHANNEL", "LLM_USAGE_SLACK_REPORT_HOUR", "LLM_USAGE_SLACK_REPORT_MINUTE",
              "LLM_USAGE_SLACK_REPORT_TIMEZONE", "LLM_USAGE_SLACK_REPORT_ENABLED", "LLM_USAGE_SLACK_REQUIRE_BILLING",
              "LLM_USAGE_SLACK_EXPECTED_BOT", "LLM_USAGE_SLACK_ALLOW_DEFAULT_TOKEN", "LLM_USAGE_USD_TO_EUR",
              "INSTANTLY_API_KEY", "METRICOOL_API_KEY", "SANCHO_INTERNAL_API_TOKEN",
              "SANCHO_DOCS_ASSISTANT_TOKEN",
              "SANCHO_MCP_TOKENS",
              # Tier 3 — Skill APIs
              "APOLLO_API_KEY", "GHL_API_KEY", "GHL_LOCATION_ID",
              "META_ACCESS_TOKEN", "META_AD_ACCOUNT_ID", "PAGESPEED_API_KEY",
              # UNIPILE_* omitted on purpose — UI-managed via YALC key store (SAN-36)
              "DATAFORSEO_API_KEY",
              # R2 / Supabase / Cloudflare / Apify
              "R2_UPLOAD_IMAGE_ACCESS_KEY_ID", "R2_UPLOAD_IMAGE_SECRET_ACCESS_KEY",
              "R2_UPLOAD_IMAGE_BUCKET_NAME", "R2_PUBLIC_URL",
              "SUPABASE_SERVICE_ROLE_KEY", "SUPABASE_ANON_KEY",
              "CLOUDFLARE_ACCOUNT_ID", "APIFY_TOKEN",
              # Variables (non-sensitive config)
              "BASE_URL", "NEXT_PUBLIC_ENV_LABEL", "NEXTAUTH_URL",
              "OD_WEB_URL", "OD_ALLOWED_ORIGINS", "OPEN_DESIGN_IMAGE", "YALC_IMAGE",
              # SAN-455: only set in DEPLOY_FROM_IMAGE mode. Persisting the pin in
              # `.env` keeps a manual `docker compose up -d` on the box on the same
              # version instead of resolving the `:latest` compose default.
              "SANCHOCMO_IMAGE",
              "MC_CHAT_GATEWAY", "SLACK_REDIRECT_URI",
              "ANTHROPIC_AUTH_MODE", "OPENAI_AUTH_MODE",
              "ADMIN_EMAIL_DOMAIN", "ADMIN_IDENTITY_EMAIL", "DATABASE_DRIVER",
              "INSTALL_HERMES", "HERMES_AGENT_REF", "HERMES_CLI",
              "HERMES_CLI_PROVIDER", "HERMES_CLI_MODEL", "HERMES_WORKDIR",
              "SANCHO_MCP_AUDIT_BACKEND", "SANCHO_MCP_AUDIT_FAIL_CLOSED",
              "SANCHO_MCP_AUDIT_FILE",
              "YALC_BASE_URL", "SANCHO_REPLY_WEBHOOK_URL",
          ]
          out = {k: os.environ[k] for k in KEYS if os.environ.get(k)}
          print(base64.b64encode(json.dumps(out).encode()).decode())
          PY
          )

          scp -o StrictHostKeyChecking=no scripts/upsert-env.py "$VPS_USER@$VPS_HOST:/tmp/upsert-env.py"

          ssh "$VPS_USER@$VPS_HOST" "DEPLOY_PATH=$DEPLOY_PATH TAG=$TAG PAYLOAD_B64=$PAYLOAD_B64 ENABLE_YALC_SERVICE=$ENABLE_YALC_SERVICE RUN_DB_MIGRATIONS=$RUN_DB_MIGRATIONS YALC_REPO_TOKEN=$YALC_REPO_TOKEN GHCR_USERNAME=$GHCR_USERNAME DEPLOY_FROM_IMAGE=$DEPLOY_FROM_IMAGE SANCHOCMO_IMAGE=$SANCHOCMO_IMAGE bash -s" <<'EOF'
            set -euo pipefail
            cd "$DEPLOY_PATH"

            # SAN-445: move (never rm) every untracked working-tree path that
            # would block `git checkout <ref>` — i.e. a path the target ref
            # tracks but the current index doesn't, that already exists on disk
            # untracked (a real dir, file, or symlink). Backs each up under
            # .deploy-collision-backups/<ts>/ so runtime data is recoverable,
            # then returns so the caller's checkout can recreate the tracked
            # version. No-op (creates nothing) when the tree is already clean.
            clear_checkout_collisions() {
              local ref="$1" bk tt th p cleared=0
              bk=".deploy-collision-backups/$(date -u +%Y%m%dT%H%M%SZ)"
              tt="$(mktemp)"; th="$(mktemp)"
              git ls-tree -r --name-only "$ref" | sort > "$tt"
              git ls-files | sort > "$th"
              while IFS= read -r p; do
                [ -n "$p" ] || continue
                { [ -e "$p" ] || [ -L "$p" ]; } || continue
                git ls-files --error-unmatch "$p" >/dev/null 2>&1 && continue
                mkdir -p "$bk/$(dirname "$p")"
                mv "$p" "$bk/$p"
                echo "▶ SAN-445: backed up + cleared colliding untracked path: $p → $bk/$p"
                cleared=$((cleared+1))
              done < <(comm -23 "$tt" "$th")
              rm -f "$tt" "$th"
              [ "$cleared" -gt 0 ] && echo "▶ SAN-445: cleared $cleared colliding path(s) into $bk"
              return 0
            }

            echo "▶ Fetching tags…"
            git fetch --tags --prune

            # See deploy-staging.yml for context: brand/<slug>/ folders are
            # transitioning from tracked to untracked-runtime. Backup before
            # checkout so the transition deploy doesn't wipe live client data.
            # No-op after the transition (folders are gitignored, untouched).
            BRAND_BACKUP_DIR="$(mktemp -d -t sancho-brand-bk-XXXXXX)"
            if [ -d workspace-sancho/brand ]; then
              echo "▶ Backing up workspace-sancho/brand/ runtime data to $BRAND_BACKUP_DIR…"
              for d in workspace-sancho/brand/*/; do
                [ -d "$d" ] || continue
                name=$(basename "$d")
                [ "$name" = "example" ] && continue
                [ "$name" = "_archived" ] && continue
                cp -a "$d" "$BRAND_BACKUP_DIR/"
              done
            fi

            # Prod can accumulate tracked local edits from historical runtime
            # generators/manual hotfixes. A tag checkout must not abort on those.
            # Stash tracked changes only: untracked runtime data remains in place,
            # and brand folders are backed up/restored explicitly above/below.
            if ! git diff --quiet || ! git diff --cached --quiet; then
              echo "▶ Stashing tracked local changes before tag checkout…"
              git stash push -m "deploy-prod-$(date -u +%Y%m%dT%H%M%SZ)" || true
            fi

            CHECKOUT_BLOCKER="plugins/mc-chat/src/attachments.js"
            if [ -e "$CHECKOUT_BLOCKER" ] && ! git ls-files --error-unmatch "$CHECKOUT_BLOCKER" >/dev/null 2>&1; then
              echo "▶ Stashing untracked $CHECKOUT_BLOCKER before tag checkout..."
              git stash push --include-untracked -m "deploy-prod-untracked-$(date -u +%Y%m%dT%H%M%SZ)" -- "$CHECKOUT_BLOCKER" || true
            fi

            # Apply GitHub `production` Environment to ~/.openclaw/.env.
            # When unpopulated (current state), this is a no-op — empty
            # secrets/vars are filtered out by the payload builder.
            # ENV_CHANGED drives a `--force-recreate` of EVERY service, so it has to
            # mean "a real config value changed" — not "we shipped a new version".
            # SANCHOCMO_IMAGE is excluded from the hash on purpose (SAN-463): image
            # mode rewrites it on every release, which made every deploy recreate
            # open-design and yalc too, even though nothing about them changed
            # (observed on v1.5.0: yalc went from `Running` to `Recreated`). It's
            # also redundant — Compose already recreates `sanchocmo` by itself when
            # the resolved image changes, which is exactly what a version bump does.
            env_hash() { grep -v '^SANCHOCMO_IMAGE=' "$1" 2>/dev/null | sha256sum | cut -d' ' -f1; }
            ENV_HASH_BEFORE=$([ -f .env ] && env_hash .env || echo "missing")
            if [ -n "${PAYLOAD_B64:-}" ]; then
              echo "▶ Upserting envs from GitHub \`production\` Environment…"
              echo "$PAYLOAD_B64" | python3 /tmp/upsert-env.py .env
            fi
            ENV_HASH_AFTER=$(env_hash .env)
            ENV_CHANGED=0
            if [ "$ENV_HASH_BEFORE" != "$ENV_HASH_AFTER" ]; then
              ENV_CHANGED=1
              echo "▶ .env config changed (will force-recreate all services)"
            fi
            rm -f /tmp/upsert-env.py

            echo "▶ Checking out $TAG…"
            # Self-heal: discard tracked files that are regenerated or locally
            # edited on the VPS and would abort the tag checkout. Runtime data
            # under workspace-sancho/brand is backed up/restored above.
            git checkout -- \
              src \
              workspace-escudero/skills \
              workspace-sancho/AGENTS.md \
              workspace-sancho/PROTOCOLS.md \
              workspace-sancho/TOOLS.md \
              workspace-sancho/_system/output/presentation-summary-protocol.md \
              workspace-sancho/mission-control.html \
              2>/dev/null || true
            # SAN-445: back up + clear untracked working-tree paths that collide
            # with a path the target ref tracks (e.g. the specialist-agent
            # workspace-<agent>/{brand,_system} symlinks added by SAN-438, which
            # the running container recreates untracked on the VPS). `git checkout`
            # aborts on such collisions ("untracked working tree files would be
            # overwritten"). We deliberately DON'T use `git stash --include-untracked`
            # here (it would sweep away all live runtime data). Instead move only the
            # exact colliding paths to a backup dir — never a blind rm — so no
            # runtime data is lost, then let checkout recreate the tracked version.
            clear_checkout_collisions "$TAG"
            git checkout "$TAG"
            export GIT_COMMIT="$(git rev-parse HEAD)"

            # Restore brand/<slug>/ files that the checkout removed.
            # `cp -a -n` merges any backup file that isn't already in target,
            # so untracked-runtime data (chat, projects) survives next to
            # restored-tracked data (foundation-state, brand-book). Idempotent.
            if [ -d "$BRAND_BACKUP_DIR" ]; then
              for d in "$BRAND_BACKUP_DIR"/*/; do
                [ -d "$d" ] || continue
                name=$(basename "$d")
                target="workspace-sancho/brand/$name"
                if [ -d "$target" ] && [ -n "$(ls -A "$target" 2>/dev/null || true)" ]; then
                  before=$(find "$target" -type f 2>/dev/null | wc -l)
                  cp -a -n "$d." "$target/" 2>/dev/null || true
                  after=$(find "$target" -type f 2>/dev/null | wc -l)
                  diff=$((after - before))
                  if [ "$diff" -gt 0 ]; then
                    echo "▶ Merged $diff missing file(s) into workspace-sancho/brand/$name from backup"
                  fi
                else
                  echo "▶ Restoring workspace-sancho/brand/$name from backup…"
                  mkdir -p "$target"
                  cp -a "$d." "$target/"
                fi
              done
              rm -rf "$BRAND_BACKUP_DIR"
            fi

            COMPOSE_ARGS="-f docker-compose.yml"
            # Open Design is an opt-in overlay (image is public). G4U keeps it on by default.
            [ "${ENABLE_OD_SERVICE:-1}" != "0" ] && COMPOSE_ARGS="$COMPOSE_ARGS -f docker-compose.od.yml"
            # YALC (Outreach) is an opt-in overlay; its image is public on GHCR
            # (pulled below via `pull --ignore-buildable`, same as Open Design).
            [ "${ENABLE_YALC_SERVICE:-1}" != "0" ] && COMPOSE_ARGS="$COMPOSE_ARGS -f docker-compose.yalc.yml"
            # SAN-455 (Fase 7, prod-only): ship the artifact CI already built for
            # this tag instead of recompiling the same source on the VPS (~2-3 min
            # of `npm ci` + `next build`, and the reason SERVER-OPS.md prescribes
            # swap + a build-cache prune cron). Opt-in per Environment via
            # DEPLOY_FROM_IMAGE=1; unset → the source build below, unchanged.
            #
            # The pull MUST name the service: `pull --ignore-buildable` further down
            # deliberately skips `sanchocmo` (it has a `build:`), so it would fetch
            # nothing. SANCHOCMO_IMAGE is also written to `.env` by the payload, so a
            # manual `docker compose up -d` on the box resolves the same version
            # instead of drifting to `:latest`.
            if [ "${DEPLOY_FROM_IMAGE:-0}" = "1" ]; then
              echo "▶ Pulling the published image for $TAG (GIT_COMMIT=$GIT_COMMIT)…"
              echo "▶   SANCHOCMO_IMAGE=$SANCHOCMO_IMAGE"
              docker compose $COMPOSE_ARGS pull sanchocmo
            else
              echo "▶ Building and starting containers (GIT_COMMIT=$GIT_COMMIT)…"
              docker compose $COMPOSE_ARGS build --pull
            fi
            if [ "${RUN_DB_MIGRATIONS:-0}" = "1" ]; then
              echo "▶ Running DB migrations…"
              # Apply only the curated additive deploy migrations via the
              # non-destructive single-file runner — mirrors deploy-staging.yml.
              # The repo's historical SQL migrations are not a safe input for
              # `drizzle-kit migrate` (no journal in git; one old migration drops/recreates
              # `tasks`). Redirect stdin so the one-off container can't eat the SSH heredoc.
              docker compose $COMPOSE_ARGS run -T --rm --no-deps --entrypoint bash sanchocmo -lc "cd /app/mc-nextjs && npm run db:migrate:deploy" < /dev/null
            fi
            # `build --pull` only refreshes images for services with a
            # `build:` directive (sanchocmo). Services that consume a
            # pre-built image (open-design via OPEN_DESIGN_IMAGE) need an
            # explicit pull, or Docker keeps the cached local image even
            # when the rolling tag (`:sanchocmo`, `:edge`) points at a new
            # digest in the registry. See deploy-staging.yml for the incident.
            if [ -n "${YALC_REPO_TOKEN:-}" ]; then
              echo "▶ Logging in to GHCR for private deploy images…"
              printf '%s' "$YALC_REPO_TOKEN" | docker login ghcr.io -u "${GHCR_USERNAME:-deploy}" --password-stdin >/dev/null
            fi
            docker compose $COMPOSE_ARGS pull --ignore-buildable || true
            UP_ARGS="--wait --wait-timeout 180"
            if [ "$ENV_CHANGED" = "1" ]; then
              UP_ARGS="$UP_ARGS --force-recreate"
            fi
            if ! docker compose $COMPOSE_ARGS up -d $UP_ARGS; then
              echo "▶ docker compose up failed; current service state:"
              docker compose $COMPOSE_ARGS ps || true
              echo "▶ yalc logs:"
              docker compose $COMPOSE_ARGS logs --no-color --tail=200 yalc || true
              echo "▶ sanchocmo logs:"
              docker compose $COMPOSE_ARGS logs --no-color --tail=200 sanchocmo || true
              exit 1
            fi
            docker compose $COMPOSE_ARGS ps
          EOF

      - name: Health check
        env:
          HEALTH_URL: ${{ vars.HEALTH_URL }}
        run: |
          if [ -z "$HEALTH_URL" ]; then
            echo "::warning::HEALTH_URL variable not set on production environment; skipping health check"
            exit 0
          fi
          echo "▶ Polling $HEALTH_URL (up to 60s)…"
          for i in {1..30}; do
            if curl -fsS --max-time 5 "$HEALTH_URL" > /dev/null; then
              echo "✓ Health check passed"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Health check failed after 60s"
          exit 1

      # The health check above only proves *something* answers — it would pass just
      # as happily if the new image was pulled but never swapped in. That's the one
      # failure mode image mode introduces, so assert the served commit is the one
      # we shipped. Scoped to image mode on purpose: the build path's behaviour is
      # not this PR's business. Failing here trips the rollback (SAN-454), which
      # now actually restores the previous app. (SAN-455)
      - name: Verify prod is serving the deployed commit (image mode only)
        if: vars.DEPLOY_FROM_IMAGE == '1'
        env:
          HEALTH_URL: ${{ vars.HEALTH_URL }}
          EXPECTED_COMMIT: ${{ steps.tag.outputs.commit }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          if [ -z "$HEALTH_URL" ]; then
            echo "::warning::HEALTH_URL not set; cannot verify the served commit."
            exit 0
          fi
          echo "▶ Expecting $TAG → commit $EXPECTED_COMMIT"
          for i in $(seq 1 30); do
            body="$(curl -fsS --max-time 5 "$HEALTH_URL" || true)"
            if [ -n "$body" ]; then
              commit="$(python3 -c 'import json,sys; print(json.load(sys.stdin).get("commit",""))' <<<"$body" 2>/dev/null || true)"
              if [ "$commit" = "$EXPECTED_COMMIT" ]; then
                echo "✓ Prod is serving $TAG ($commit)"
                exit 0
              fi
              echo "  … serving '${commit:-missing}', expected '$EXPECTED_COMMIT'"
            fi
            sleep 2
          done
          echo "::error::Prod answered health checks but never reported commit $EXPECTED_COMMIT — the new image is not the one serving traffic. Rolling back."
          exit 1

      # SAN-454: a rollback must put back the version prod was SERVING, not just
      # the source tree. The app runs out of the image (`/app/mc-nextjs`), while
      # the checkout only feeds the `~/.openclaw` volume (workspace/skills/prompts)
      # — so `git checkout $PREV` alone rolls back the data and leaves the failed
      # build serving traffic, then reports success. Both have to move together:
      # check out $PREV *and* pin `SANCHOCMO_IMAGE` to $PREV's published image.
      - name: Rollback on failure
        if: failure() && steps.tag.outcome == 'success' && steps.current.outputs.ref != ''
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '~/.openclaw' }}
          FAILED_TAG: ${{ steps.tag.outputs.tag }}
          PREV: ${{ steps.current.outputs.ref }}
          # Passed explicitly: the remote script reads `${ENABLE_*:-1}`, so without
          # these a rollback would compose a different overlay set than the deploy
          # it is undoing (harmless today — production has ENABLE_YALC_SERVICE=1,
          # which matches the default — but only by coincidence). (SAN-454)
          ENABLE_YALC_SERVICE: ${{ vars.ENABLE_YALC_SERVICE || '1' }}
          ENABLE_OD_SERVICE: ${{ vars.ENABLE_OD_SERVICE || '1' }}
        run: |
          if [ "$PREV" = "$FAILED_TAG" ]; then
            echo "::warning::Prod was already running $FAILED_TAG before this run; nothing to roll back to."
            exit 0
          fi
          echo "::warning::Deploy of $FAILED_TAG failed. Rolling back to $PREV (the version prod was running)…"
          ssh "$VPS_USER@$VPS_HOST" "DEPLOY_PATH=$DEPLOY_PATH FAILED_TAG=$FAILED_TAG PREV=$PREV ENABLE_YALC_SERVICE=$ENABLE_YALC_SERVICE ENABLE_OD_SERVICE=$ENABLE_OD_SERVICE bash -s" <<'EOF'
            set -euo pipefail
            cd "$DEPLOY_PATH"

            # SAN-445: same collision guard as the deploy step (separate SSH
            # session → redefined here). Backs up + clears untracked paths that
            # would block the rollback checkout; no-op when the tree is clean.
            clear_checkout_collisions() {
              local ref="$1" bk tt th p cleared=0
              bk=".deploy-collision-backups/$(date -u +%Y%m%dT%H%M%SZ)"
              tt="$(mktemp)"; th="$(mktemp)"
              git ls-tree -r --name-only "$ref" | sort > "$tt"
              git ls-files | sort > "$th"
              while IFS= read -r p; do
                [ -n "$p" ] || continue
                { [ -e "$p" ] || [ -L "$p" ]; } || continue
                git ls-files --error-unmatch "$p" >/dev/null 2>&1 && continue
                mkdir -p "$bk/$(dirname "$p")"
                mv "$p" "$bk/$p"
                echo "▶ SAN-445: backed up + cleared colliding untracked path: $p → $bk/$p"
                cleared=$((cleared+1))
              done < <(comm -23 "$tt" "$th")
              rm -f "$tt" "$th"
              [ "$cleared" -gt 0 ] && echo "▶ SAN-445: cleared $cleared colliding path(s) into $bk"
              return 0
            }

            if [ -z "${PREV:-}" ]; then
              echo "No rollback target captured; cannot rollback"
              exit 1
            fi
            echo "▶ Rolling back to $PREV"

            # Client data & config across a rollback — why this step doesn't carry
            # the deploy step's brand backup/restore (verified 2026-07-14):
            #  • brand/<slug>/ is UNTRACKED (.gitignore keeps only `example/`), and
            #    NO Release v1.0.0..v1.4.0 tracks a client slug — SAN-340's orphan
            #    squash finished that transition. So `git checkout $PREV` has no
            #    client file to delete, and clear_checkout_collisions has none to
            #    move. Re-track a slug and that stops being true.
            #  • Live data survives the container swap because it's a BIND MOUNT
            #    (~/.openclaw → /root/.openclaw); --force-recreate replaces the
            #    container, never the mount. Postgres keeps a named volume and
            #    --no-deps leaves it untouched (prod is on Neon regardless).
            #  • `.env` is deliberately NOT reverted: the deploy may have upserted
            #    new values before failing, and those are usually the correct ones
            #    (e.g. a rotated secret). Old code ignores keys it doesn't read.
            #  • No schema skew: RUN_DB_MIGRATIONS is unset in both Environments,
            #    so a deploy never migrates — old code can't meet a newer schema.
            CHECKOUT_BLOCKER="plugins/mc-chat/src/attachments.js"
            if [ -e "$CHECKOUT_BLOCKER" ] && ! git ls-files --error-unmatch "$CHECKOUT_BLOCKER" >/dev/null 2>&1; then
              echo "▶ Stashing untracked $CHECKOUT_BLOCKER before rollback checkout..."
              git stash push --include-untracked -m "deploy-prod-rollback-untracked-$(date -u +%Y%m%dT%H%M%SZ)" -- "$CHECKOUT_BLOCKER" || true
            fi
            clear_checkout_collisions "$PREV"
            git checkout "$PREV"
            export GIT_COMMIT="$(git rev-parse HEAD)"
            COMPOSE_ARGS="-f docker-compose.yml"
            [ "${ENABLE_OD_SERVICE:-1}" != "0" ] && COMPOSE_ARGS="$COMPOSE_ARGS -f docker-compose.od.yml"
            [ "${ENABLE_YALC_SERVICE:-1}" != "0" ] && COMPOSE_ARGS="$COMPOSE_ARGS -f docker-compose.yalc.yml"

            # Pin the app to $PREV's own image instead of whatever `:latest` points
            # at locally — after a failed deploy that's the build we're undoing.
            # Compose interpolates this from the shell env, which wins over `.env`.
            export SANCHOCMO_IMAGE="ghcr.io/growth4u-systems/sanchocmo:$PREV"

            # This pull MUST name the service. The `pull --ignore-buildable` below
            # skips `sanchocmo` by design (it has a `build:`, so a build host never
            # pulls a foreign image) — and prod builds from source, so $PREV's image
            # is not in the local cache either. Without an explicit pull there'd be
            # nothing to roll back TO.
            ROLLED_BACK_VIA="image $SANCHOCMO_IMAGE"
            if ! docker compose $COMPOSE_ARGS pull sanchocmo; then
              # No published image for $PREV — e.g. prod sits on a pre-image-era
              # tag, on a raw SHA, or the package was pruned. Rebuild from the
              # tree we just checked out: slow, but a rollback that gives up is
              # worse than a slow one.
              echo "::warning::No image for $PREV — falling back to building it from source."
              docker compose $COMPOSE_ARGS build sanchocmo
              ROLLED_BACK_VIA="source build at $PREV"
            fi
            docker compose $COMPOSE_ARGS pull --ignore-buildable || true

            # --force-recreate is the whole point: same image NAME as the running
            # container is not the same image. Without it Compose sees no config
            # change and leaves the failed container up.
            docker compose $COMPOSE_ARGS up -d --force-recreate --no-deps sanchocmo
            docker compose $COMPOSE_ARGS up -d
            echo "▶ Rolled back to $PREV via $ROLLED_BACK_VIA"
            docker compose $COMPOSE_ARGS ps
          EOF
