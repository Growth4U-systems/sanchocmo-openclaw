name: Release Please

# Branching model (docs/CONTRIBUTING.md → "Release to production"):
# release-please runs on `main` — the single trunk where all work integrates
# (SAN-444). It keeps a single open "release PR" (chore: release vX.Y.Z) that
# accumulates every Conventional Commit since the last release. Merging that PR
# cuts the tag + GitHub Release from `main`. The tags ARE the releases — there is
# no separate release-pointer branch to keep in sync.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Open / merge release PR
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          # PAT (repo scope) instead of GITHUB_TOKEN: the org disallows
          # GitHub Actions from creating PRs, so the default token can't
          # open the release PR. A user PAT bypasses that org restriction.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          # No target-branch: the repo's default branch is `main` (the single
          # trunk, SAN-444), which is exactly where the release PR + tag live.
          # Tags ARE the releases; there is no separate release-pointer branch to
          # promote (promote-main.yml was retired with the two-branch model).
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
