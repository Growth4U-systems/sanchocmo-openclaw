name: Promote main to release tag

# Branching model (docs/plans/branching-release-model-proposal.md):
# `main` is a fast-forward-only pointer to the latest production release.
# release-please cuts the tag + Release from `staging`; when that Release is
# published this job fast-forwards `main` to the tag's commit. `main` never
# receives direct work or a PR, so it can never diverge from `staging`.
#
# This does NOT deploy — deploy-prod.yml handles prod (also on release:
# published, behind the `production` environment approval gate).

on:
  release:
    types: [published]

permissions:
  contents: write

# Never run two promotions at once; let an in-flight one finish.
concurrency:
  group: promote-main
  cancel-in-progress: false

jobs:
  promote:
    name: Fast-forward main to ${{ github.event.release.tag_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PAT: main's ruleset blocks direct pushes for everyone except this
          # token's identity (bypass actor). The default GITHUB_TOKEN can't get
          # past the pull-request requirement. Same secret release-please uses.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Fast-forward main to the release tag
        run: |
          set -euo pipefail
          TAG="${{ github.event.release.tag_name }}"
          git fetch origin --tags --quiet
          TAG_SHA="$(git rev-parse "${TAG}^{commit}")"
          MAIN_SHA="$(git rev-parse origin/main)"
          echo "Release ${TAG} → ${TAG_SHA}"
          echo "Current main → ${MAIN_SHA}"

          if [ "${TAG_SHA}" = "${MAIN_SHA}" ]; then
            echo "✓ main already at ${TAG} — nothing to do."
            exit 0
          fi

          # Refuse anything that isn't a true fast-forward. In the healthy model
          # the tag is cut from staging and main is an ancestor of staging, so
          # this is always a ff. A non-ff means main diverged and a human must
          # reconcile it (it should never happen by construction).
          if ! git merge-base --is-ancestor "${MAIN_SHA}" "${TAG_SHA}"; then
            echo "::error::main (${MAIN_SHA}) is not an ancestor of ${TAG} (${TAG_SHA}) — refusing non-fast-forward promote. Reconcile main↔staging." >&2
            exit 1
          fi

          git push origin "${TAG_SHA}:refs/heads/main"
          echo "✓ main fast-forwarded to ${TAG}"
