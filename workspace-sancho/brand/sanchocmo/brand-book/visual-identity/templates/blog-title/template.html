<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>{{slot.title}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800;900&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1200px; height: 630px;
    background: {{brand.primary_dark}};
    font-family: 'Roboto', system-ui, sans-serif;
    color: #fff;
    overflow: hidden;
    position: relative;
  }
  .bg { position: absolute; inset: 0; background: linear-gradient(135deg, {{brand.primary_dark}} 0%, {{brand.primary}} 35%, {{brand.primary_light}} 100%); }

  .bokeh { position: absolute; border-radius: 50%; filter: blur(80px); }
  .bokeh.b1 { width: 360px; height: 360px; top: -120px; right: -100px; background: {{brand.accent}}; opacity: 0.40; }
  .bokeh.b2 { width: 320px; height: 320px; bottom: -100px; left: 100px; background: {{brand.primary_light}}; opacity: 0.35; }
  .bokeh.b3 { width: 220px; height: 220px; top: 240px; right: 240px; background: {{brand.accent}}; opacity: 0.22; }

  /* Subtle dot grid texture — gives the cover a "documented" feel */
  .grid {
    position: absolute; inset: 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(255, 255, 255, 0.05) 1px, transparent 0);
    background-size: 24px 24px;
    z-index: 1;
  }

  .stripe {
    position: absolute; top: 0; bottom: 0; left: 0; width: 8px;
    background: linear-gradient(180deg, {{brand.accent}} 0%, {{brand.primary_light}} 50%, {{brand.primary_light}} 100%);
    z-index: 2;
  }

  .stage {
    position: relative; z-index: 3;
    height: 100%;
    padding: 56px 80px 48px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 24px;
  }

  .top-row {
    display: flex; align-items: center; justify-content: space-between; gap: 24px;
  }
  .kicker {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 10px 22px;
    border: 1.5px solid rgba(15, 174, 193, 0.45);
    background: rgba(15, 174, 193, 0.10);
    border-radius: 999px;
    font-family: 'Manrope', sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: {{brand.accent}};
    width: fit-content;
  }
  .kicker .dot {
    width: 9px; height: 9px; border-radius: 50%; background: {{brand.accent}};
    box-shadow: 0 0 12px {{brand.accent}};
  }

  .brand-mark {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 18px;
    color: rgba(255, 255, 255, 0.75);
    letter-spacing: -0.01em;
  }
  .brand-mark img { height: 32px; width: auto; opacity: 0.95; }

  .title {
    align-self: center;
    font-family: 'Manrope', sans-serif;
    font-weight: 900;
    font-size: 64px;
    line-height: 1.04;
    letter-spacing: -0.025em;
    color: #ffffff;
    max-width: 1000px;
    text-wrap: balance;
  }
  .title.long { font-size: 52px; }

  .meta {
    display: flex; align-items: center; gap: 24px;
    padding-top: 22px;
    border-top: 1.5px solid rgba(255, 255, 255, 0.18);
    font-family: 'Manrope', sans-serif;
  }
  .meta .author {
    font-weight: 700;
    font-size: 20px;
    color: rgba(255, 255, 255, 0.95);
  }
  .meta .sep {
    color: rgba(255, 255, 255, 0.35);
    font-size: 18px;
  }
  .meta .secondary {
    font-weight: 600;
    font-size: 16px;
    color: rgba(255, 255, 255, 0.60);
    letter-spacing: 0.02em;
  }
  .meta .read-time {
    margin-left: auto;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 14px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.18);
    font-weight: 700;
    font-size: 14px;
    color: rgba(255, 255, 255, 0.85);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .meta .read-time::before {
    content: '';
    width: 6px; height: 6px; border-radius: 50%; background: {{brand.accent}};
  }

  .accent-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 8px;
    background: linear-gradient(90deg, {{brand.accent}} 0%, {{brand.primary_light}} 50%, {{brand.primary_light}} 100%);
    z-index: 4;
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid"></div>
  <div class="bokeh b1"></div>
  <div class="bokeh b2"></div>
  <div class="bokeh b3"></div>
  <div class="stripe"></div>

  <div class="stage">
    <div class="top-row">
      <div class="kicker">
        <span class="dot"></span>
        <span>{{slot.kicker}}</span>
      </div>
      <div class="brand-mark">
        <img src="{{brand.logo}}" alt="" />
        <span>{{brand.name}}</span>
      </div>
    </div>

    <h1 class="title">{{slot.title}}</h1>

    <div class="meta">
      <span class="author">{{slot.author}}</span>
      <!-- if:slot.date_label -->
      <span class="sep">·</span>
      <span class="secondary">{{slot.date_label}}</span>
      <!-- /if:slot.date_label -->
      <!-- if:slot.read_time -->
      <span class="read-time">{{slot.read_time}}</span>
      <!-- /if:slot.read_time -->
    </div>
  </div>

  <div class="accent-bar"></div>
</body>
</html>
