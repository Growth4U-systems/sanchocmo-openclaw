<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>{{slot.concept}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800;900&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1200px; height: 630px;
    background: {{brand.primary_dark}};
    font-family: 'Roboto', system-ui, sans-serif;
    color: #fff;
    overflow: hidden;
    position: relative;
  }
  .bg { position: absolute; inset: 0; background: linear-gradient(120deg, {{brand.primary}} 0%, {{brand.primary_light}} 55%, {{brand.accent}} 100%); }
  .bokeh { position: absolute; border-radius: 50%; filter: blur(60px); }
  .bokeh.b1 { width: 320px; height: 320px; top: -100px; right: -80px; background: {{brand.accent}}; opacity: 0.55; }
  .bokeh.b2 { width: 280px; height: 280px; bottom: -100px; left: 280px; background: {{brand.primary_light}}; opacity: 0.40; }
  .bokeh.b3 { width: 200px; height: 200px; top: 200px; left: -80px; background: {{brand.accent}}; opacity: 0.30; }
  .stripe {
    position: absolute; top: 0; bottom: 0; left: 0; width: 8px;
    background: linear-gradient(180deg, {{brand.accent}} 0%, {{brand.primary_light}} 50%, {{brand.primary_light}} 100%);
  }

  .stage {
    position: relative; z-index: 2;
    height: 100%;
    padding: 56px 64px;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    grid-template-rows: auto 1fr auto;
    grid-template-areas:
      "kicker character"
      "copy   character"
      "footer character";
    gap: 16px 48px;
    overflow: hidden;
  }
  .stage.no-character {
    grid-template-columns: 1fr;
    grid-template-areas:
      "kicker"
      "copy"
      "footer";
  }

  .kicker {
    grid-area: kicker;
    align-self: flex-start;
    display: inline-flex; align-items: center; gap: 10px;
    padding: 8px 18px;
    border: 1.5px solid rgba(15, 174, 193, 0.45);
    background: rgba(15, 174, 193, 0.10);
    border-radius: 999px;
    font-family: 'Manrope', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: {{brand.accent}};
    width: fit-content;
  }
  .kicker .dot { width: 8px; height: 8px; border-radius: 50%; background: {{brand.accent}}; box-shadow: 0 0 10px {{brand.accent}}; }

  .copy {
    grid-area: copy;
    display: flex; flex-direction: column;
    justify-content: center;
    gap: 22px;
    min-width: 0;
  }
  .concept {
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 56px;
    line-height: 1.06;
    letter-spacing: -0.025em;
    color: #ffffff;
    max-width: 600px;
    text-wrap: balance;
  }
  .data-row {
    display: flex; align-items: baseline; gap: 18px;
    padding: 14px 20px;
    border-left: 5px solid {{brand.accent}};
    background: rgba(15, 174, 193, 0.08);
    border-radius: 0 12px 12px 0;
    max-width: 600px;
  }
  .data-value {
    font-family: 'Manrope', sans-serif;
    font-weight: 900;
    font-size: 48px;
    line-height: 1;
    color: {{brand.accent}};
    letter-spacing: -0.02em;
    flex-shrink: 0;
  }
  .data-label {
    font-family: 'Roboto', sans-serif;
    font-weight: 500;
    font-size: 18px;
    line-height: 1.30;
    color: rgba(255, 255, 255, 0.85);
  }

  .character {
    grid-area: character;
    width: 320px;
    align-self: stretch;
    display: flex;
    align-items: end;
    justify-content: end;
  }
  .character img {
    max-width: 100%; max-height: 100%;
    object-fit: contain;
    object-position: bottom right;
    filter: drop-shadow(-10px 10px 0 rgba(2, 19, 42, 0.40));
  }

  .footer {
    grid-area: footer;
    display: flex; align-items: center; gap: 14px;
    padding-top: 16px;
    border-top: 1.5px solid rgba(255, 255, 255, 0.18);
  }
  .footer img { height: 32px; width: auto; opacity: 0.95; }
  .footer .handle {
    font-family: 'Manrope', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: rgba(255, 255, 255, 0.65);
    flex: 1;
  }

  .accent-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 8px;
    background: linear-gradient(90deg, {{brand.accent}} 0%, {{brand.primary_light}} 50%, {{brand.primary_light}} 100%);
    z-index: 3;
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="bokeh b1"></div>
  <div class="bokeh b2"></div>
  <div class="bokeh b3"></div>
  <div class="stripe"></div>

  <div class="stage">
    <div class="kicker">
      <span class="dot"></span>
      <span>{{slot.kicker}}</span>
    </div>

    <div class="copy">
      <h1 class="concept">{{slot.concept}}</h1>
      <!-- if:slot.data_value -->
      <div class="data-row">
        <span class="data-value">{{slot.data_value}}</span>
        <span class="data-label">{{slot.data_label}}</span>
      </div>
      <!-- /if:slot.data_value -->
    </div>

    <!-- if:slot.hero_image_url -->
    <div class="character">
      <img src="{{slot.hero_image_url|attr}}" alt="" />
    </div>
    <!-- /if:slot.hero_image_url -->

    <div class="footer">
      <img src="{{brand.logo}}" alt="" />
      <span class="handle">{{brand.footer}}</span>
    </div>
  </div>

  <div class="accent-bar"></div>
</body>
</html>
