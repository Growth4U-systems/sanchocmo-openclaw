<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>{{slot.cta_title}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800;900&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1080px; height: 1350px;
    background: {{brand.primary_dark}};
    font-family: 'Roboto', system-ui, sans-serif;
    color: #fff;
    overflow: hidden;
    position: relative;
  }
  .bg { position: absolute; inset: 0; background: linear-gradient(160deg, {{brand.primary}} 0%, {{brand.primary_light}} 50%, {{brand.accent}} 100%); }
  .bokeh { position: absolute; border-radius: 50%; filter: blur(70px); }
  .bokeh.b1 { width: 480px; height: 480px; top: -100px; left: -120px; background: {{brand.accent}}; opacity: 0.50; }
  .bokeh.b2 { width: 360px; height: 360px; bottom: -80px; right: -80px; background: {{brand.primary_light}}; opacity: 0.45; }
  .stripe {
    position: absolute; top: 0; bottom: 0; left: 0; width: 8px;
    background: linear-gradient(180deg, {{brand.accent}} 0%, {{brand.primary_light}} 100%);
  }

  .slide-num {
    position: absolute;
    top: 56px; right: 64px;
    font-family: 'Manrope', sans-serif;
    font-size: 110px; font-weight: 900;
    color: transparent;
    -webkit-text-stroke: 3px rgba(255, 255, 255, 0.45);
    line-height: 1;
    z-index: 2;
  }

  .stage {
    position: relative; z-index: 3;
    height: 100%;
    padding: 96px 88px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 24px;
  }

  .kicker {
    align-self: flex-start;
    display: inline-flex; align-items: center; gap: 14px;
    padding: 12px 24px;
    border: 2px solid rgba(255, 255, 255, 0.55);
    background: rgba(255, 255, 255, 0.18);
    border-radius: 999px;
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 20px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #ffffff;
    width: fit-content;
  }
  .kicker .dot {
    width: 12px; height: 12px; border-radius: 50%; background: {{brand.accent}};
    box-shadow: 0 0 18px {{brand.accent}};
  }

  .body {
    display: flex;
    align-items: end;
    gap: 32px;
    overflow: hidden;
  }
  .body > .copy { flex: 1; min-width: 0; padding-bottom: 32px; display: flex; flex-direction: column; gap: 32px; justify-content: center; }
  .body > .character { flex: 0 0 360px; align-self: stretch; display: flex; align-items: end; justify-content: end; }

  .title {
    font-family: 'Manrope', sans-serif;
    font-weight: 900;
    font-size: 76px;
    line-height: 1.04;
    letter-spacing: -0.02em;
    color: {{brand.accent}};
  }
  .invitation {
    font-family: 'Roboto', sans-serif;
    font-weight: 400;
    font-size: 32px;
    line-height: 1.40;
    color: rgba(255, 255, 255, 0.95);
    padding: 22px 28px;
    border-left: 6px solid {{brand.accent}};
    background: rgba(255, 255, 255, 0.08);
    border-radius: 0 16px 16px 0;
    max-width: 580px;
    white-space: pre-line;
  }

  .character img {
    max-width: 100%; max-height: 100%;
    object-fit: contain;
    object-position: bottom right;
    filter: drop-shadow(-12px 12px 0 rgba(0, 0, 0, 0.40));
  }

  .footer {
    display: flex; align-items: center; gap: 24px;
    padding-top: 28px;
    border-top: 1.5px solid rgba(255, 255, 255, 0.18);
  }
  .footer .label {
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: {{brand.accent}};
    flex: 1;
  }
  .footer .logo-block {
    display: flex; align-items: center; gap: 14px;
  }
  .footer .logo-block img { height: 48px; width: auto; object-fit: contain; }
  .footer .logo-block .handle {
    font-family: 'Manrope', sans-serif;
    font-weight: 700;
    font-size: 20px;
    color: rgba(255, 255, 255, 0.65);
  }

  .accent-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 12px;
    background: linear-gradient(90deg, {{brand.accent}} 0%, {{brand.primary_light}} 100%);
    z-index: 4;
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="bokeh b1"></div>
  <div class="bokeh b2"></div>
  <div class="stripe"></div>

  <div class="slide-num">{{slide_number_padded}}</div>

  <div class="stage">
    <div class="kicker">
      <span class="dot"></span>
      <span>Tu turno</span>
    </div>

    <div class="body">
      <div class="copy">
        <h1 class="title">{{slot.cta_title}}</h1>
        <div class="invitation">{{slot.cta_text}}</div>
      </div>
      <!-- if:slot.cta_image_url -->
      <div class="character">
        <img src="{{slot.cta_image_url|attr}}" alt="" />
      </div>
      <!-- /if:slot.cta_image_url -->
    </div>

    <div class="footer">
      <span class="label">Comenta · DM</span>
      <div class="logo-block">
        <img src="{{brand.logo}}" alt="" />
        <span class="handle">{{brand.footer}}</span>
      </div>
    </div>
  </div>

  <div class="accent-bar"></div>
</body>
</html>
