<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>{{per_slide.slide_title}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800;900&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1080px; height: 1080px;
    background: {{brand.primary_dark}};
    font-family: 'Roboto', system-ui, sans-serif;
    color: #fff;
    overflow: hidden;
    position: relative;
  }
  .bg { position: absolute; inset: 0; background: linear-gradient(160deg, {{brand.primary}} 0%, {{brand.primary_dark}} 60%, {{brand.primary}} 100%); }
  .bokeh { position: absolute; border-radius: 50%; filter: blur(70px); }
  .bokeh.b1 { width: 360px; height: 360px; top: -100px; right: -120px; background: {{brand.accent}}; opacity: 0.30; }
  .bokeh.b2 { width: 300px; height: 300px; bottom: 60px; left: -80px; background: {{brand.primary_light}}; opacity: 0.25; }
  .stripe {
    position: absolute; top: 0; bottom: 0; left: 0; width: 8px;
    background: linear-gradient(180deg, {{brand.accent}} 0%, {{brand.primary_light}} 50%, {{brand.primary_light}} 100%);
  }

  .pager {
    position: absolute;
    top: 48px; right: 56px;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 18px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.10);
    border: 1.5px solid rgba(15, 174, 193, 0.40);
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: 0.10em;
    color: {{brand.accent}};
    z-index: 3;
  }

  .slide-num {
    position: absolute;
    top: 56px; left: 80px;
    font-family: 'Manrope', sans-serif;
    font-size: 180px; font-weight: 900;
    color: transparent;
    -webkit-text-stroke: 3px rgba(15, 174, 193, 0.30);
    line-height: 1;
    z-index: 1;
  }

  .stage {
    position: relative; z-index: 2;
    height: 100%;
    padding: 80px 80px 96px;
    display: flex; flex-direction: column;
    justify-content: center;
    gap: 28px;
  }

  .heading {
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 64px;
    line-height: 1.06;
    letter-spacing: -0.02em;
    color: #ffffff;
    max-width: 880px;
  }
  .heading::before {
    content: '';
    display: block;
    width: 84px; height: 6px;
    background: linear-gradient(90deg, {{brand.accent}}, {{brand.primary_light}});
    border-radius: 6px;
    margin-bottom: 28px;
  }
  .text {
    font-family: 'Roboto', sans-serif;
    font-weight: 400;
    font-size: 36px;
    line-height: 1.40;
    color: rgba(255, 255, 255, 0.92);
    max-width: 880px;
    white-space: pre-line;
  }

  .footer {
    position: absolute;
    left: 80px; right: 80px; bottom: 56px;
    display: flex; align-items: center; gap: 18px;
    z-index: 3;
  }
  .footer img { height: 36px; width: auto; opacity: 0.85; }
  .footer .handle {
    font-family: 'Manrope', sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: rgba(255, 255, 255, 0.55);
  }

  .accent-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 10px;
    background: linear-gradient(90deg, {{brand.accent}} 0%, {{brand.primary_light}} 50%, {{brand.primary_light}} 100%);
    z-index: 4;
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="bokeh b1"></div>
  <div class="bokeh b2"></div>
  <div class="stripe"></div>

  <div class="slide-num">{{slide_number_padded}}</div>
  <div class="pager">{{slide_number}} / {{total_slides}}</div>

  <div class="stage">
    <h2 class="heading">{{per_slide.slide_title}}</h2>
    <div class="text">{{per_slide.slide_text}}</div>
  </div>

  <div class="footer">
    <img src="{{brand.logo}}" alt="" />
    <span class="handle">{{brand.footer}}</span>
  </div>

  <div class="accent-bar"></div>
</body>
</html>
