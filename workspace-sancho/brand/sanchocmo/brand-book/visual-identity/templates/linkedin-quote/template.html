<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>{{slot.headline}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800;900&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1080px; height: 1350px;
    background: {{brand.primary_dark}};
    font-family: 'Roboto', system-ui, sans-serif;
    color: #ffffff;
    overflow: hidden;
    position: relative;
  }
  .bg {
    position: absolute; inset: 0;
    background: linear-gradient(160deg, {{brand.primary}} 0%, {{brand.primary_light}} 50%, {{brand.accent}} 100%);
  }
  .bokeh { position: absolute; border-radius: 50%; filter: blur(70px); }
  .bokeh.b1 { width: 420px; height: 420px; top: -100px; right: -120px; background: {{brand.accent}}; opacity: 0.55; }
  .bokeh.b2 { width: 380px; height: 380px; bottom: 200px; left: -100px; background: {{brand.primary_light}}; opacity: 0.45; }
  .bokeh.b3 { width: 220px; height: 220px; top: 540px; right: 80px; background: {{brand.accent}}; opacity: 0.30; }
  .stripe {
    position: absolute; top: 0; bottom: 0; left: 0; width: 8px;
    background: linear-gradient(180deg, {{brand.accent}} 0%, {{brand.primary_light}} 100%);
  }

  .stage {
    position: relative; z-index: 2;
    height: 100%;
    padding: 96px 88px;
    display: flex; flex-direction: column; justify-content: space-between;
  }

  .badge {
    align-self: flex-start;
    display: inline-flex; align-items: center; gap: 14px;
    padding: 12px 24px;
    border: 1.5px solid rgba(255, 255, 255, 0.40);
    background: rgba(255, 255, 255, 0.10);
    border-radius: 999px;
    font-family: 'Manrope', sans-serif;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: {{brand.accent}};
  }
  .badge .dot {
    width: 12px; height: 12px; border-radius: 50%; background: {{brand.accent}};
    box-shadow: 0 0 16px {{brand.accent}};
  }

  .hero {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 48px;
    margin: 56px 0;
    overflow: hidden;
  }
  .hero > .quote { flex: 1; min-width: 0; }
  .hero > .character { flex: 0 0 320px; align-self: stretch; display: flex; align-items: end; justify-content: end; }

  .quote {
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 84px;
    line-height: 1.05;
    letter-spacing: -0.025em;
    color: #ffffff;
    text-wrap: balance;
  }
  .quote::before {
    content: '"';
    display: block;
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 160px;
    line-height: 0.6;
    color: {{brand.accent}};
    opacity: 0.45;
    margin-bottom: 18px;
  }

  .character img {
    max-width: 100%; max-height: 100%;
    object-fit: contain;
    object-position: bottom right;
    filter: drop-shadow(-12px 12px 0 rgba(0, 0, 0, 0.35));
  }

  .footer {
    display: flex; align-items: center; gap: 24px;
    padding-top: 32px;
    border-top: 1.5px solid rgba(255, 255, 255, 0.18);
  }
  .footer .attribution {
    font-family: 'Manrope', sans-serif;
    font-weight: 600;
    font-size: 28px;
    color: rgba(255, 255, 255, 0.92);
    flex: 1;
  }
  .footer .logo-block {
    display: flex; align-items: center; gap: 16px;
  }
  .footer .logo-block img {
    height: 56px;
    width: auto;
    object-fit: contain;
  }
  .footer .logo-block .handle {
    font-family: 'Manrope', sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: rgba(255, 255, 255, 0.65);
  }

  .accent-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 12px;
    background: linear-gradient(90deg, {{brand.accent}} 0%, {{brand.primary_light}} 100%);
    z-index: 3;
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="bokeh b1"></div>
  <div class="bokeh b2"></div>
  <div class="bokeh b3"></div>
  <div class="stripe"></div>

  <div class="stage">
    <div class="badge">
      <span class="dot"></span>
      <span>{{slot.badge}}</span>
    </div>

    <div class="hero">
      <div class="quote">{{slot.headline}}</div>
      <!-- if:slot.hero_image_url -->
      <div class="character">
        <img src="{{slot.hero_image_url|attr}}" alt="" />
      </div>
      <!-- /if:slot.hero_image_url -->
    </div>

    <div class="footer">
      <div class="attribution">{{slot.attribution}}</div>
      <div class="logo-block">
        <img src="{{brand.logo}}" alt="" />
      </div>
    </div>
  </div>

  <div class="accent-bar"></div>
</body>
</html>
