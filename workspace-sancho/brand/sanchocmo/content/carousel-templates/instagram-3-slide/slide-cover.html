<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>{{slot.cover_title}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800;900&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1080px; height: 1080px;
    background: {{brand.primary_dark}};
    font-family: 'Roboto', system-ui, sans-serif;
    color: #fff;
    overflow: hidden;
    position: relative;
  }
  .bg { position: absolute; inset: 0; background: linear-gradient(160deg, {{brand.primary}} 0%, {{brand.primary_light}} 40%, {{brand.accent}} 100%); }
  .bokeh { position: absolute; border-radius: 50%; filter: blur(70px); }
  .bokeh.b1 { width: 420px; height: 420px; top: -120px; right: -120px; background: {{brand.accent}}; opacity: 0.55; }
  .bokeh.b2 { width: 360px; height: 360px; bottom: -100px; left: -100px; background: {{brand.primary_light}}; opacity: 0.45; }
  .stripe {
    position: absolute; top: 0; bottom: 0; left: 0; width: 8px;
    background: linear-gradient(180deg, {{brand.accent}} 0%, {{brand.primary_light}} 50%, {{brand.primary_light}} 100%);
  }

  .pager {
    position: absolute;
    top: 48px; right: 56px;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 18px;
    border-radius: 999px;
    background: rgba(15, 174, 193, 0.18);
    border: 1.5px solid rgba(15, 174, 193, 0.45);
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: 0.10em;
    color: {{brand.accent}};
    z-index: 3;
  }

  .stage {
    position: relative; z-index: 2;
    height: 100%;
    padding: 80px 80px 96px;
    display: flex; flex-direction: column;
    gap: 24px;
  }

  .body {
    flex: 1;
    display: flex;
    align-items: end;
    gap: 28px;
    overflow: hidden;
    padding-top: 80px;
  }
  .body > .copy { flex: 1; min-width: 0; padding-bottom: 12px; }
  .body > .character { flex: 0 0 320px; align-self: stretch; display: flex; align-items: end; justify-content: end; }
  .body > .character img {
    max-width: 100%; max-height: 100%;
    object-fit: contain;
    object-position: bottom right;
    filter: drop-shadow(-10px 10px 0 rgba(2, 19, 42, 0.45));
  }

  .hook {
    font-family: 'Manrope', sans-serif;
    font-weight: 900;
    font-size: 90px;
    line-height: 1.02;
    letter-spacing: -0.025em;
    text-wrap: balance;
  }
  .subtitle {
    margin-top: 24px;
    font-family: 'Manrope', sans-serif;
    font-weight: 600;
    font-size: 30px;
    line-height: 1.30;
    color: rgba(255, 255, 255, 0.78);
    max-width: 520px;
  }

  .footer {
    display: flex; align-items: center; gap: 18px;
  }
  .footer img { height: 40px; width: auto; opacity: 0.95; }
  .footer .handle {
    font-family: 'Manrope', sans-serif;
    font-weight: 700;
    font-size: 20px;
    color: rgba(255, 255, 255, 0.70);
    flex: 1;
  }
  .footer .swipe {
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: {{brand.accent}};
  }

  .accent-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 10px;
    background: linear-gradient(90deg, {{brand.accent}} 0%, {{brand.primary_light}} 50%, {{brand.primary_light}} 100%);
    z-index: 4;
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="bokeh b1"></div>
  <div class="bokeh b2"></div>
  <div class="stripe"></div>

  <div class="pager">{{slide_number}} / {{total_slides}}</div>

  <div class="stage">
    <div class="body">
      <div class="copy">
        <h1 class="hook">{{slot.cover_title}}</h1>
        <div class="subtitle">{{slot.cover_subtitle}}</div>
      </div>
      <!-- if:slot.hero_image_url -->
      <div class="character">
        <img src="{{slot.hero_image_url|attr}}" alt="" />
      </div>
      <!-- /if:slot.hero_image_url -->
    </div>

    <div class="footer">
      <img src="{{brand.logo}}" alt="" />
      <span class="handle">{{brand.footer}}</span>
      <span class="swipe">→ desliza</span>
    </div>
  </div>

  <div class="accent-bar"></div>
</body>
</html>
