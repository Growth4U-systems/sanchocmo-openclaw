<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    width: 1080px;
    height: 1080px;
    background: #032149;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    position: relative;
  }
  
  .scene {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }
  
  .scene img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center;
    opacity: 0.12;
  }
  
  .container {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    padding: 64px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  
  .top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  
  .logo {
    font-weight: 900;
    font-size: 28px;
    color: white;
  }
  .logo span { color: #0faec1; }
  
  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: #0faec1;
    background: rgba(15, 174, 193, 0.15);
    border: 1px solid rgba(15, 174, 193, 0.3);
    padding: 8px 18px;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }
  
  .center {
    display: flex;
    align-items: center;
    gap: 48px;
  }
  
  .character {
    width: 320px;
    height: 400px;
    flex-shrink: 0;
  }
  
  .character img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: brightness(0) invert(1);
    opacity: 0.9;
  }
  
  .quote-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  
  .big-stat {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 96px;
    color: #f59e0b;
    line-height: 1;
    letter-spacing: -3px;
  }
  
  .big-stat span {
    font-size: 48px;
    color: #f59e0b;
    opacity: 0.6;
  }
  
  .quote-text {
    font-weight: 800;
    font-size: 36px;
    line-height: 1.25;
    letter-spacing: -1px;
    color: #FFFFFF;
  }
  
  .quote-text .teal {
    color: #0faec1;
  }
  
  .quote-sub {
    font-weight: 400;
    font-size: 20px;
    line-height: 1.5;
    color: rgba(255, 255, 255, 0.5);
  }
  
  .bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  
  .author {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  
  .author-name {
    font-weight: 700;
    font-size: 18px;
    color: white;
  }
  
  .author-role {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.4);
  }
  
  .cta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: #0faec1;
    border: 1.5px solid rgba(15, 174, 193, 0.4);
    padding: 10px 20px;
    border-radius: 6px;
  }
  
  /* Accent */
  .top-line {
    position: absolute;
    top: 0;
    left: 64px;
    right: 64px;
    height: 4px;
    background: linear-gradient(90deg, #3f45fe, #0faec1, #f59e0b);
    border-radius: 0 0 2px 2px;
  }
</style>
</head>
<body>
  <div class="scene">
    <img src="alfonso-unit-economics-scene.png" alt="">
  </div>
  <div class="top-line"></div>
  
  <div class="container">
    <div class="top">
      <div class="logo">Growth<span>4U</span></div>
      <div class="tag">📊 Unit Economics</div>
    </div>
    
    <div class="center">
      <div class="character">
        <img src="../alfonso-character-final.png" alt="Alfonso">
      </div>
      <div class="quote-block">
        <div class="big-stat">90<span>%</span></div>
        <h2 class="quote-text">de las fintechs <span class="teal">calcula mal su CAC.</span></h2>
        <p class="quote-sub">Y luego se preguntan por qué no escalan.</p>
      </div>
    </div>
    
    <div class="bottom">
      <div class="author">
        <div>
          <div class="author-name">Alfonso Sainz de Baranda</div>
          <div class="author-role">Founder · Growth4U</div>
        </div>
      </div>
      <div class="cta">Leer artículo completo →</div>
    </div>
  </div>
</body>
</html>
