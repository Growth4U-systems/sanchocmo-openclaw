<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    width: 1080px;
    height: 1080px;
    background: #FAFAF9;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    position: relative;
  }
  
  .container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: row;
    position: relative;
  }
  
  .left-panel {
    flex: 1;
    padding: 72px 56px 72px 72px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    z-index: 2;
  }
  
  .right-panel {
    width: 380px;
    position: relative;
    overflow: hidden;
  }
  
  .right-panel img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }
  
  .right-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, #FAFAF9 0%, transparent 20%);
  }
  
  .right-overlay-bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 30%;
    background: linear-gradient(0deg, rgba(15, 23, 42, 0.7) 0%, transparent 100%);
  }
  
  .logo {
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    font-size: 24px;
    color: #2563EB;
    letter-spacing: -0.5px;
  }
  
  .quote-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 28px;
    max-width: 580px;
  }
  
  .quote-mark {
    font-size: 80px;
    color: #2563EB;
    font-weight: 900;
    line-height: 0.5;
    opacity: 0.3;
  }
  
  .quote-text {
    font-weight: 800;
    font-size: 40px;
    line-height: 1.25;
    letter-spacing: -1px;
    color: #0F172A;
  }
  
  .quote-highlight {
    color: #2563EB;
  }
  
  .quote-sub {
    font-weight: 400;
    font-size: 20px;
    line-height: 1.5;
    color: #64748B;
    max-width: 480px;
  }
  
  .bottom-info {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  
  .author-name-bottom {
    font-weight: 700;
    font-size: 18px;
    color: #0F172A;
  }
  
  .divider-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #CBD5E1;
  }
  
  .author-role {
    font-weight: 400;
    font-size: 16px;
    color: #64748B;
  }
  
  .accent-bar {
    position: absolute;
    left: 0;
    top: 72px;
    bottom: 72px;
    width: 5px;
    background: linear-gradient(180deg, #2563EB, #7C3AED, #F97316);
    border-radius: 3px;
  }
</style>
</head>
<body>
  <div class="accent-bar"></div>
  <div class="container">
    <div class="left-panel">
      <div class="logo">Growth4U</div>
      
      <div class="quote-block">
        <div class="quote-mark">"</div>
        <h1 class="quote-text">
          El 90% de las fintechs <span class="quote-highlight">miden mal su CAC.</span>
          Y luego se preguntan por qué no escalan.
        </h1>
        <p class="quote-sub">No es un problema de presupuesto. Es un problema de atribución y de no construir activos de confianza.</p>
      </div>
      
      <div class="bottom-info">
        <span class="author-name-bottom">Alfonso Sainz de Baranda</span>
        <div class="divider-dot"></div>
        <span class="author-role">Founder · Growth4U</span>
      </div>
    </div>
    
    <div class="right-panel">
      <img src="../alfonso-office-teal.jpg" alt="Alfonso">
      <div class="right-overlay"></div>
      <div class="right-overlay-bottom"></div>
    </div>
  </div>
</body>
</html>
