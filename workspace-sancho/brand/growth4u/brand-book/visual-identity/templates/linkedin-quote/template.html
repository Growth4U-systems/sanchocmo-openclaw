<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>LinkedIn Quote — {{brand.name}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    font-family: 'Roboto', sans-serif;
    color: #FFFFFF;
    position: relative;
  }

  .canvas {
    width: 1080px;
    height: 1350px;
    position: relative;
    background: linear-gradient(160deg, #032149 0%, #1a3690 35%, #0faec1 100%);
    overflow: hidden;
  }

  /* Bokeh blobs */
  .bokeh {
    position: absolute;
    border-radius: 50%;
    filter: blur(70px);
    opacity: 0.35;
    pointer-events: none;
  }
  .bokeh-1 {
    width: 400px; height: 400px;
    background: #0faec1;
    top: -100px; right: -80px;
  }
  .bokeh-2 {
    width: 350px; height: 350px;
    background: #6351d5;
    bottom: 200px; left: -120px;
  }
  .bokeh-3 {
    width: 280px; height: 280px;
    background: #45b6f7;
    top: 40%; right: 15%;
    opacity: 0.2;
  }

  /* Stripe lateral */
  .stripe-left {
    position: absolute;
    left: 0; top: 0;
    width: 8px; height: 100%;
    background: linear-gradient(180deg, #0faec1, #3f45fe, #6351d5);
    z-index: 10;
  }

  /* Accent bar bottom */
  .accent-bar {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 10px;
    background: linear-gradient(90deg, #0faec1, #1a3690, #6351d5);
    z-index: 10;
  }

  /* Content layout */
  .content {
    position: relative;
    z-index: 5;
    display: flex;
    flex-direction: column;
    height: 100%;
    padding: 64px 72px 80px;
  }

  /* Kicker */
  .kicker {
    font-family: 'Manrope', sans-serif;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #0faec1;
    margin-bottom: 32px;
  }

  /* Quote */
  .quote-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 32px;
  }

  .quote {
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 54px;
    line-height: 1.2;
    color: #FFFFFF;
    text-shadow: 0 2px 8px rgba(3, 33, 73, 0.6);
  }

  .quote .teal { color: #0faec1; }

  /* Data callout */
  .data-callout {
    display: inline-flex;
    align-items: baseline;
    gap: 12px;
    margin-top: 8px;
  }
  .data-value {
    font-family: 'Manrope', sans-serif;
    font-weight: 700;
    font-size: 36px;
    line-height: 1.1;
    color: #0faec1;
  }
  .data-label {
    font-family: 'Roboto', sans-serif;
    font-weight: 500;
    font-size: 16px;
    color: rgba(255,255,255,0.7);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Character area */
  .character-area {
    position: absolute;
    bottom: 140px;
    right: 40px;
    width: 380px;
    z-index: 4;
    pointer-events: none;
  }
  .character-area img {
    width: 100%;
    height: auto;
    filter: drop-shadow(-12px 12px 0 rgba(2,19,42,0.45));
  }

  /* Footer */
  .footer {
    position: relative;
    z-index: 6;
    margin-top: auto;
    padding-top: 24px;
    border-top: 1.5px solid rgba(255,255,255,0.18);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .attribution {
    font-family: 'Roboto', sans-serif;
    font-weight: 500;
    font-size: 18px;
    color: rgba(255,255,255,0.85);
  }

  .brand-footer {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-logo {
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 28px;
    color: #FFFFFF;
  }
  .brand-logo .four-u {
    background: linear-gradient(90deg, #0faec1, #3f45fe, #6351d5);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .brand-url {
    font-family: 'Roboto', sans-serif;
    font-weight: 400;
    font-size: 14px;
    color: rgba(255,255,255,0.5);
  }
</style>
</head>
<body>
<div class="canvas">
  <!-- Bokeh -->
  <div class="bokeh bokeh-1"></div>
  <div class="bokeh bokeh-2"></div>
  <div class="bokeh bokeh-3"></div>

  <!-- Stripe lateral -->
  <div class="stripe-left"></div>

  <!-- Accent bar bottom -->
  <div class="accent-bar"></div>

  <!-- Content -->
  <div class="content">
    <!-- if:slot.kicker -->
    <div class="kicker">{{slot.kicker}}</div>
    <!-- /if:slot.kicker -->

    <div class="quote-area">
      <div class="quote">{{slot.quote}}</div>

      <!-- if:slot.data_value -->
      <div class="data-callout">
        <span class="data-value">{{slot.data_value}}</span>
        <!-- if:slot.data_label -->
        <span class="data-label">{{slot.data_label}}</span>
        <!-- /if:slot.data_label -->
      </div>
      <!-- /if:slot.data_value -->
    </div>

    <div class="footer">
      <div class="attribution">{{slot.attribution}}</div>
      <div class="brand-footer">
        <div class="brand-logo">Growth<span class="four-u">4U</span></div>
        <div class="brand-url">growth4u.io</div>
      </div>
    </div>
  </div>

  <!-- if:slot.hero_image_url -->
  <div class="character-area">
    <img src="{{slot.hero_image_url|attr}}" alt="" />
  </div>
  <!-- /if:slot.hero_image_url -->
</div>
</body>
</html>
