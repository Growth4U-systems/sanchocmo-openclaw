<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Blog Post Image — {{brand.name}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Roboto', sans-serif;
    color: #FFFFFF;
  }

  .canvas {
    width: 1200px;
    height: 630px;
    position: relative;
    background: linear-gradient(160deg, #032149 0%, #1a3690 35%, #0faec1 100%);
    overflow: hidden;
  }

  .bokeh { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.3; pointer-events: none; }
  .bokeh-1 { width: 300px; height: 300px; background: #0faec1; top: -80px; right: -40px; }
  .bokeh-2 { width: 250px; height: 250px; background: #6351d5; bottom: -60px; left: -60px; }
  .bokeh-3 { width: 180px; height: 180px; background: #45b6f7; top: 25%; left: 45%; opacity: 0.2; }

  .stripe-top {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 6px;
    background: linear-gradient(90deg, #0faec1, #3f45fe, #6351d5);
    z-index: 10;
  }

  .accent-bar {
    position: absolute; bottom: 0; left: 0;
    width: 100%; height: 6px;
    background: linear-gradient(90deg, #0faec1, #1a3690, #6351d5);
    z-index: 10;
  }

  .content {
    position: relative; z-index: 5;
    display: flex; flex-direction: column;
    justify-content: center;
    height: 100%;
    padding: 48px 56px;
  }

  .kicker {
    font-family: 'Manrope', sans-serif;
    font-weight: 600; font-size: 13px;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: #0faec1;
    margin-bottom: 16px;
  }

  .title {
    font-family: 'Manrope', sans-serif;
    font-weight: 800; font-size: 40px;
    line-height: 1.15; letter-spacing: -1px;
    color: #FFFFFF;
    text-shadow: 0 2px 8px rgba(3, 33, 73, 0.6);
    max-width: 680px;
    margin-bottom: 12px;
  }

  .subtitle {
    font-family: 'Roboto', sans-serif;
    font-weight: 400; font-size: 20px;
    line-height: 1.5;
    color: rgba(255,255,255,0.75);
    max-width: 620px;
  }

  .data-callout {
    display: inline-flex; align-items: baseline; gap: 12px;
    margin-top: 20px;
  }
  .data-value {
    font-family: 'Manrope', sans-serif;
    font-weight: 700; font-size: 36px;
    color: #0faec1;
  }
  .data-label {
    font-family: 'Roboto', sans-serif;
    font-weight: 500; font-size: 14px;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .character-area {
    position: absolute;
    bottom: 0; right: 40px;
    width: 300px; z-index: 4;
    pointer-events: none;
  }
  .character-area img {
    width: 100%; height: auto;
    filter: drop-shadow(-12px 12px 0 rgba(2,19,42,0.45));
  }

  .brand-watermark {
    position: absolute;
    bottom: 20px; left: 56px;
    z-index: 6;
    display: flex; align-items: center; gap: 8px;
  }

  .brand-logo {
    font-family: 'Manrope', sans-serif;
    font-weight: 800; font-size: 20px; color: #FFFFFF;
  }
  .brand-logo .four-u {
    background: linear-gradient(90deg, #0faec1, #3f45fe, #6351d5);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .brand-url {
    font-family: 'Roboto', sans-serif;
    font-weight: 400; font-size: 13px;
    color: rgba(255,255,255,0.45);
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="bokeh bokeh-1"></div>
  <div class="bokeh bokeh-2"></div>
  <div class="bokeh bokeh-3"></div>
  <div class="stripe-top"></div>
  <div class="accent-bar"></div>

  <div class="content">
    <!-- if:slot.kicker -->
    <div class="kicker">{{slot.kicker}}</div>
    <!-- /if:slot.kicker -->

    <div class="title">{{slot.title}}</div>

    <!-- if:slot.subtitle -->
    <div class="subtitle">{{slot.subtitle}}</div>
    <!-- /if:slot.subtitle -->

    <!-- if:slot.data_value -->
    <div class="data-callout">
      <span class="data-value">{{slot.data_value}}</span>
      <!-- if:slot.data_label -->
      <span class="data-label">{{slot.data_label}}</span>
      <!-- /if:slot.data_label -->
    </div>
    <!-- /if:slot.data_value -->
  </div>

  <!-- if:slot.hero_image_url -->
  <div class="character-area">
    <img src="{{slot.hero_image_url|attr}}" alt="" />
  </div>
  <!-- /if:slot.hero_image_url -->

  <div class="brand-watermark">
    <div class="brand-logo">Growth<span class="four-u">4U</span></div>
    <div class="brand-url">growth4u.io</div>
  </div>
</div>
</body>
</html>
