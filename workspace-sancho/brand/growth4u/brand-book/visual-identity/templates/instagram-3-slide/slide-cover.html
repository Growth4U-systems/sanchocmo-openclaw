<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>IG Cover — {{brand.name}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Roboto', sans-serif;
    color: #FFFFFF;
  }

  .canvas {
    width: 1080px;
    height: 1080px;
    position: relative;
    background: linear-gradient(160deg, #032149 0%, #1a3690 35%, #0faec1 100%);
    overflow: hidden;
  }

  .bokeh { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.3; pointer-events: none; }
  .bokeh-1 { width: 350px; height: 350px; background: #0faec1; top: -80px; right: -40px; }
  .bokeh-2 { width: 280px; height: 280px; background: #6351d5; bottom: 100px; left: -80px; }
  .bokeh-3 { width: 200px; height: 200px; background: #45b6f7; top: 30%; right: 25%; opacity: 0.2; }

  .stripe-left {
    position: absolute; left: 0; top: 0;
    width: 8px; height: 100%;
    background: linear-gradient(180deg, #0faec1, #3f45fe, #6351d5);
    z-index: 10;
  }

  .accent-bar {
    position: absolute; bottom: 0; left: 0;
    width: 100%; height: 8px;
    background: linear-gradient(90deg, #0faec1, #1a3690, #6351d5);
    z-index: 10;
  }

  .content {
    position: relative; z-index: 5;
    display: flex; flex-direction: column;
    height: 100%;
    padding: 56px 64px 64px;
  }

  .kicker {
    font-family: 'Manrope', sans-serif;
    font-weight: 600; font-size: 14px;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: #0faec1;
    margin-bottom: 16px;
  }

  .slide-counter {
    font-family: 'Manrope', sans-serif;
    font-weight: 700; font-size: 14px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 32px;
  }

  .title-area {
    flex: 1;
    display: flex; flex-direction: column;
    justify-content: center;
  }

  .title {
    font-family: 'Manrope', sans-serif;
    font-weight: 800; font-size: 48px;
    line-height: 1.15; letter-spacing: -1.5px;
    color: #FFFFFF;
    text-shadow: 0 2px 8px rgba(3, 33, 73, 0.6);
    max-width: 600px;
  }

  .character-area {
    position: absolute;
    bottom: 60px; right: 32px;
    width: 320px; z-index: 4;
    pointer-events: none;
  }
  .character-area img {
    width: 100%; height: auto;
    filter: drop-shadow(-12px 12px 0 rgba(2,19,42,0.45));
  }

  .footer {
    position: relative; z-index: 6;
    margin-top: auto; padding-top: 20px;
    border-top: 1.5px solid rgba(255,255,255,0.18);
    display: flex; align-items: center; justify-content: space-between;
  }

  .brand-logo {
    font-family: 'Manrope', sans-serif;
    font-weight: 800; font-size: 24px; color: #FFFFFF;
  }
  .brand-logo .four-u {
    background: linear-gradient(90deg, #0faec1, #3f45fe, #6351d5);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .swipe-hint {
    font-family: 'Roboto', sans-serif;
    font-weight: 400; font-size: 14px;
    color: rgba(255,255,255,0.5);
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="bokeh bokeh-1"></div>
  <div class="bokeh bokeh-2"></div>
  <div class="bokeh bokeh-3"></div>
  <div class="stripe-left"></div>
  <div class="accent-bar"></div>

  <div class="content">
    <!-- if:slot.cover_kicker -->
    <div class="kicker">{{slot.cover_kicker}}</div>
    <!-- /if:slot.cover_kicker -->

    <div class="slide-counter">{{slide_number_padded}} / {{total_slides}}</div>

    <div class="title-area">
      <div class="title">{{slot.cover_title}}</div>
    </div>

    <div class="footer">
      <div class="brand-logo">Growth<span class="four-u">4U</span></div>
      <div class="swipe-hint">Desliza →</div>
    </div>
  </div>

  <!-- if:slot.hero_image_url -->
  <div class="character-area">
    <img src="{{slot.hero_image_url|attr}}" alt="" />
  </div>
  <!-- /if:slot.hero_image_url -->
</div>
</body>
</html>
