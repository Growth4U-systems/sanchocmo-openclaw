<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Blog Title / OG — {{brand.name}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Roboto', sans-serif;
    color: #FFFFFF;
  }

  .canvas {
    width: 1200px;
    height: 630px;
    position: relative;
    background: #032149;
    overflow: hidden;
  }

  /* Subtle geometric pattern overlay */
  .geo-pattern {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 85% 20%, rgba(15, 174, 193, 0.12) 0%, transparent 50%),
      radial-gradient(circle at 10% 80%, rgba(99, 81, 213, 0.10) 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, rgba(63, 69, 254, 0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  /* Top accent stripe */
  .stripe-top {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 6px;
    background: linear-gradient(90deg, #0faec1, #3f45fe, #6351d5);
    z-index: 10;
  }

  /* Bottom accent bar */
  .accent-bar {
    position: absolute; bottom: 0; left: 0;
    width: 100%; height: 6px;
    background: linear-gradient(90deg, #0faec1, #1a3690, #6351d5);
    z-index: 10;
  }

  .content {
    position: relative; z-index: 5;
    display: flex; flex-direction: column;
    justify-content: center;
    height: 100%;
    padding: 56px 72px;
  }

  .kicker {
    font-family: 'Manrope', sans-serif;
    font-weight: 600; font-size: 13px;
    letter-spacing: 2px; text-transform: uppercase;
    color: #0faec1;
    margin-bottom: 24px;
  }

  .title {
    font-family: 'Manrope', sans-serif;
    font-weight: 800; font-size: 46px;
    line-height: 1.12; letter-spacing: -1.5px;
    color: #FFFFFF;
    max-width: 900px;
    margin-bottom: 32px;
  }

  .meta-row {
    display: flex; align-items: center; gap: 24px;
  }

  .author {
    font-family: 'Roboto', sans-serif;
    font-weight: 500; font-size: 16px;
    color: rgba(255,255,255,0.7);
  }

  .divider {
    width: 1px; height: 16px;
    background: rgba(255,255,255,0.25);
  }

  .read-time {
    font-family: 'Roboto', sans-serif;
    font-weight: 400; font-size: 14px;
    color: rgba(255,255,255,0.5);
  }

  .brand-watermark {
    position: absolute;
    bottom: 24px; right: 72px;
    z-index: 6;
    display: flex; align-items: center; gap: 8px;
  }

  .brand-logo {
    font-family: 'Manrope', sans-serif;
    font-weight: 800; font-size: 22px; color: #FFFFFF;
  }
  .brand-logo .four-u {
    background: linear-gradient(90deg, #0faec1, #3f45fe, #6351d5);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .brand-url {
    font-family: 'Roboto', sans-serif;
    font-weight: 400; font-size: 13px;
    color: rgba(255,255,255,0.4);
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="geo-pattern"></div>
  <div class="stripe-top"></div>
  <div class="accent-bar"></div>

  <div class="content">
    <!-- if:slot.kicker -->
    <div class="kicker">{{slot.kicker}}</div>
    <!-- /if:slot.kicker -->

    <div class="title">{{slot.title}}</div>

    <div class="meta-row">
      <!-- if:slot.author -->
      <div class="author">{{slot.author}}</div>
      <!-- /if:slot.author -->

      <!-- if:slot.read_time -->
      <div class="divider"></div>
      <div class="read-time">{{slot.read_time}} lectura</div>
      <!-- /if:slot.read_time -->
    </div>
  </div>

  <div class="brand-watermark">
    <div class="brand-logo">Growth<span class="four-u">4U</span></div>
    <div class="brand-url">growth4u.io</div>
  </div>
</div>
</body>
</html>
