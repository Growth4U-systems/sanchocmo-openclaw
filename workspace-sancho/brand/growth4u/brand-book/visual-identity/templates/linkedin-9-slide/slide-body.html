<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide Body — {{brand.name}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    font-family: 'Roboto', sans-serif;
    color: #032149;
  }

  .canvas {
    width: 1080px;
    height: 1350px;
    position: relative;
    background: #FFFFFF;
    overflow: hidden;
  }

  .stripe-left {
    position: absolute; left: 0; top: 0;
    width: 8px; height: 100%;
    background: linear-gradient(180deg, #0faec1, #3f45fe, #6351d5);
    z-index: 10;
  }

  .accent-bar {
    position: absolute; bottom: 0; left: 0;
    width: 100%; height: 8px;
    background: linear-gradient(90deg, #0faec1, #1a3690, #6351d5);
    z-index: 10;
  }

  .content {
    position: relative; z-index: 5;
    display: flex; flex-direction: column;
    height: 100%;
    padding: 64px 80px 80px;
  }

  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 48px;
  }

  .slide-counter {
    font-family: 'Manrope', sans-serif;
    font-weight: 700; font-size: 16px;
    color: #0faec1;
  }

  .brand-logo-sm {
    font-family: 'Manrope', sans-serif;
    font-weight: 800; font-size: 20px;
    color: #032149;
  }
  .brand-logo-sm .four-u {
    background: linear-gradient(90deg, #0faec1, #3f45fe, #6351d5);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .body-area {
    flex: 1;
    display: flex; flex-direction: column;
    justify-content: center;
    gap: 40px;
  }

  .slide-number-big {
    font-family: 'Manrope', sans-serif;
    font-weight: 800; font-size: 88px;
    color: rgba(15, 174, 193, 0.15);
    line-height: 1;
  }

  .slide-title {
    font-family: 'Manrope', sans-serif;
    font-weight: 800; font-size: 52px;
    line-height: 1.2; letter-spacing: -1px;
    color: #032149;
    max-width: 850px;
  }

  .slide-text {
    font-family: 'Roboto', sans-serif;
    font-weight: 400; font-size: 30px;
    line-height: 1.6;
    color: #475569;
    max-width: 820px;
  }

  .data-callout {
    display: inline-flex; align-items: baseline; gap: 16px;
    padding: 20px 32px;
    background: rgba(15, 174, 193, 0.08);
    border-left: 4px solid #0faec1;
    border-radius: 0 12px 12px 0;
  }
  .data-value {
    font-family: 'Manrope', sans-serif;
    font-weight: 700; font-size: 52px;
    color: #0faec1;
  }
  .data-label {
    font-family: 'Roboto', sans-serif;
    font-weight: 500; font-size: 22px;
    color: #475569;
  }

  .footer {
    margin-top: auto; padding-top: 24px;
    border-top: 1.5px solid rgba(3, 33, 73, 0.1);
    display: flex; align-items: center; justify-content: space-between;
  }

  .footer-url {
    font-family: 'Roboto', sans-serif;
    font-weight: 400; font-size: 14px;
    color: #94a3b8;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="stripe-left"></div>
  <div class="accent-bar"></div>

  <div class="content">
    <div class="header">
      <div class="slide-counter">{{slide_number_padded}} / {{total_slides}}</div>
      <div class="brand-logo-sm">Growth<span class="four-u">4U</span></div>
    </div>

    <div class="body-area">
      <div class="slide-number-big">{{slide_number_padded}}</div>

      <div class="slide-title">{{per_slide.slide_title}}</div>

      <div class="slide-text">{{per_slide.slide_text}}</div>

      <!-- if:per_slide.slide_data_value -->
      <div class="data-callout">
        <span class="data-value">{{per_slide.slide_data_value}}</span>
        <!-- if:per_slide.slide_data_label -->
        <span class="data-label">{{per_slide.slide_data_label}}</span>
        <!-- /if:per_slide.slide_data_label -->
      </div>
      <!-- /if:per_slide.slide_data_value -->
    </div>

    <div class="footer">
      <div class="footer-url">growth4u.io</div>
    </div>
  </div>
</div>
</body>
</html>
