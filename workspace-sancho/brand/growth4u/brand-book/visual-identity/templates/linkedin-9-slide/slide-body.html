<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide Body — {{brand.name}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Roboto:wght@400;500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --navy:    #032149;
    --teal:    #0faec1;
    --electric:#3f45fe;
    --purple:  #6351d5;
    --body:    #475569;
    --muted:   #94a3b8;
    --bg:      #f8f9fb;
    --grad-stripe: linear-gradient(180deg, #0faec1, #3f45fe, #6351d5);
    --grad-accent: linear-gradient(90deg, #0faec1, #1a3690, #6351d5);
    --grad-logo:   linear-gradient(90deg, #0faec1, #3f45fe, #6351d5);
  }

  body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    font-family: 'Roboto', sans-serif;
    color: var(--navy);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .canvas {
    width: 1080px;
    height: 1350px;
    position: relative;
    background: #ffffff;
    overflow: hidden;
    isolation: isolate;
  }

  /* ambient tinted corner — subtle, not bokeh */
  .corner-tint {
    position: absolute;
    top: 0; right: 0;
    width: 540px; height: 540px;
    background: radial-gradient(ellipse at top right, rgba(15,174,193,0.08) 0%, rgba(15,174,193,0) 70%);
    pointer-events: none;
    z-index: 1;
  }

  .stripe-left {
    position: absolute; left: 0; top: 0;
    width: 6px; height: 100%;
    background: var(--grad-stripe);
    z-index: 12;
  }
  .accent-bar {
    position: absolute; bottom: 0; left: 0;
    width: 100%; height: 8px;
    background: var(--grad-accent);
    z-index: 12;
  }

  .content {
    position: relative; z-index: 5;
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100%;
    padding: 72px 80px 88px;
  }

  /* --- header --- */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 24px;
    border-bottom: 1.5px solid rgba(3,33,73,0.08);
  }
  .slide-counter {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-weight: 500;
    font-size: 17px;
    letter-spacing: 2.8px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .slide-counter strong {
    color: var(--teal);
    font-weight: 500;
  }
  .brand-logo-sm {
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 26px;
    color: var(--navy);
    letter-spacing: -0.4px;
  }
  .brand-logo-sm .four-u {
    background: var(--grad-logo);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  /* --- body --- */
  .body-area {
    align-self: center;
    display: flex; flex-direction: column;
    gap: 36px;
    max-width: 880px;
  }

  /* editorial eyebrow — always a teal em-rule; optional kicker text on top.
     the slide-counter in the header carries the index, so the rule alone
     reads as a section divider. when slide_eyebrow is provided, it adds a
     contextual label like "DIAGNÓSTICO" or "TAKE 03". */
  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 20px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-weight: 500;
    font-size: 19px;
    letter-spacing: 2.8px;
    text-transform: uppercase;
    color: var(--teal);
    min-height: 16px;
  }
  .eyebrow::before {
    content: '';
    display: inline-block;
    width: 52px; height: 2px;
    background: var(--teal);
    flex-shrink: 0;
  }
  .eyebrow .eyebrow-text { display: inline-block; }

  .slide-title {
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 76px;
    line-height: 1.04;
    letter-spacing: -2px;
    color: var(--navy);
    text-wrap: balance;
  }

  .slide-text {
    font-family: 'Roboto', sans-serif;
    font-weight: 400;
    font-size: 34px;
    line-height: 1.5;
    color: var(--body);
    text-wrap: pretty;
    max-width: 880px;
  }
  .slide-text strong {
    color: var(--navy);
    font-weight: 500;
    background: linear-gradient(to top, rgba(15,174,193,0.18) 0%, rgba(15,174,193,0.18) 32%, transparent 32%);
    padding: 0 2px;
  }

  /* editorial pull-stat — hairline divider, big teal cifra, mono label.
     no rounded card, no left-border accent. */
  .stat-pull {
    margin-top: 8px;
    display: grid;
    grid-template-columns: auto 1fr;
    column-gap: 36px;
    align-items: center;
    padding-top: 32px;
    border-top: 1.5px solid rgba(3,33,73,0.1);
  }
  .stat-value {
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 128px;
    line-height: 1;
    letter-spacing: -4.5px;
    color: var(--teal);
    font-variant-numeric: tabular-nums;
  }
  .stat-label {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-weight: 500;
    font-size: 19px;
    line-height: 1.45;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--body);
    max-width: 420px;
  }

  /* --- footer --- */
  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 24px;
    border-top: 1.5px solid rgba(3,33,73,0.08);
  }
  .footer-url {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-weight: 500;
    font-size: 16px;
    letter-spacing: 1.6px;
    color: var(--muted);
  }
  .footer-swipe {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-weight: 500;
    font-size: 16px;
    letter-spacing: 2.2px;
    color: var(--teal);
    text-transform: uppercase;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="corner-tint"></div>
  <div class="stripe-left"></div>
  <div class="accent-bar"></div>

  <div class="content">
    <div class="header">
      <div class="slide-counter"><strong>{{slide_number_padded}}</strong> / {{total_slides_padded}}</div>
      <div class="brand-logo-sm">Growth<span class="four-u">4U</span></div>
    </div>

    <div class="body-area">
      <div class="eyebrow">
        <!-- if:per_slide.slide_eyebrow -->
        <span class="eyebrow-text">{{per_slide.slide_eyebrow}}</span>
        <!-- /if:per_slide.slide_eyebrow -->
      </div>

      <h2 class="slide-title">{{per_slide.slide_title}}</h2>

      <p class="slide-text">{{per_slide.slide_text}}</p>

      <!-- if:per_slide.slide_data_value -->
      <div class="stat-pull">
        <div class="stat-value">{{per_slide.slide_data_value}}</div>
        <!-- if:per_slide.slide_data_label -->
        <div class="stat-label">{{per_slide.slide_data_label}}</div>
        <!-- /if:per_slide.slide_data_label -->
      </div>
      <!-- /if:per_slide.slide_data_value -->
    </div>

    <div class="footer">
      <div class="footer-url">growth4u.io</div>
      <div class="footer-swipe">Sigue →</div>
    </div>
  </div>
</div>
</body>
</html>
