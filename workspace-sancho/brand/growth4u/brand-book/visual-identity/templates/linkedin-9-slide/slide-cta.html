<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide CTA — {{brand.name}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Roboto:wght@400;500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --navy:     #032149;
    --royal:    #1a3690;
    --electric: #3f45fe;
    --teal:     #0faec1;
    --purple:   #6351d5;
    --white:    #ffffff;
    --grad-brand:  linear-gradient(160deg, #032149 0%, #1a3690 35%, #0faec1 100%);
    --grad-stripe: linear-gradient(180deg, #0faec1, #3f45fe, #6351d5);
    --grad-accent: linear-gradient(90deg, #0faec1, #1a3690, #6351d5);
    --grad-logo:   linear-gradient(90deg, #0faec1, #3f45fe, #6351d5);
  }

  body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    font-family: 'Roboto', sans-serif;
    color: var(--white);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .canvas {
    width: 1080px;
    height: 1350px;
    position: relative;
    background: var(--grad-brand);
    overflow: hidden;
    isolation: isolate;
  }

  /* one decisive glow flourish — top-right, teal (consistent w/ cover) */
  .glow {
    position: absolute;
    width: 820px; height: 820px;
    top: -300px; right: -240px;
    background: radial-gradient(circle at center, rgba(15,174,193,0.55) 0%, rgba(15,174,193,0.0) 65%);
    filter: blur(20px);
    pointer-events: none;
    z-index: 1;
  }

  .stripe-left {
    position: absolute; left: 0; top: 0;
    width: 6px; height: 100%;
    background: var(--grad-stripe);
    z-index: 12;
  }
  .accent-bar {
    position: absolute; bottom: 0; left: 0;
    width: 100%; height: 8px;
    background: var(--grad-accent);
    z-index: 12;
  }

  .content {
    position: relative; z-index: 5;
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100%;
    padding: 72px 80px 88px;
  }

  /* --- header --- */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .eyebrow {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-weight: 500;
    font-size: 19px;
    letter-spacing: 2.8px;
    text-transform: uppercase;
    color: var(--teal);
    display: inline-flex;
    align-items: center;
    gap: 16px;
  }
  .eyebrow::before {
    content: '';
    display: inline-block;
    width: 32px; height: 2px;
    background: var(--teal);
  }
  .slide-counter {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-weight: 500;
    font-size: 17px;
    letter-spacing: 2.8px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
  }
  .slide-counter strong {
    color: var(--teal);
    font-weight: 500;
  }

  /* --- cta block (left-aligned, mirrors cover composition) --- */
  .cta-area {
    align-self: center;
    display: flex; flex-direction: column;
    gap: 36px;
    max-width: 800px;
    z-index: 6;
  }
  .cta-headline {
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 104px;
    line-height: 0.98;
    letter-spacing: -3.2px;
    color: var(--white);
    text-shadow: 0 2px 12px rgba(3,33,73,0.55);
    text-wrap: balance;
  }
  .cta-headline em {
    font-style: normal;
    background: var(--grad-logo);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: none;
  }
  .cta-subtext {
    font-family: 'Roboto', sans-serif;
    font-weight: 400;
    font-size: 34px;
    line-height: 1.4;
    color: rgba(255,255,255,0.82);
    max-width: 680px;
  }
  .cta-button {
    margin-top: 16px;
    align-self: flex-start;
    display: inline-flex;
    align-items: center;
    gap: 18px;
    font-family: 'Manrope', sans-serif;
    font-weight: 700;
    font-size: 32px;
    color: var(--navy);
    background: var(--teal);
    padding: 28px 52px 28px 56px;
    border-radius: 999px;
    box-shadow: 0 8px 32px rgba(15,174,193,0.38), 0 2px 0 rgba(255,255,255,0.18) inset;
    text-decoration: none;
    letter-spacing: -0.3px;
  }
  .cta-button .arrow {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--navy);
    color: var(--teal);
    font-size: 22px;
    font-weight: 700;
    transform: translateY(-1px);
  }

  /* end-mark — subtle closing flourish above the footer logo.
     mirrors the eyebrow rule on body slides; signals "this is the end". */
  .end-mark {
    position: absolute;
    left: 80px;
    bottom: 160px;
    display: inline-flex;
    align-items: center;
    gap: 16px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-weight: 500;
    font-size: 16px;
    letter-spacing: 3.2px;
    text-transform: uppercase;
    color: var(--teal);
    z-index: 6;
  }
  .end-mark::before {
    content: '';
    display: inline-block;
    width: 42px; height: 2px;
    background: var(--teal);
  }

  /* --- footer --- */
  .footer {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding-top: 28px;
    border-top: 1.5px solid rgba(255,255,255,0.18);
  }
  .brand-logo {
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 36px;
    color: var(--white);
    letter-spacing: -0.5px;
  }
  .brand-logo .four-u {
    background: var(--grad-logo);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .footer-meta {
    display: flex; flex-direction: column;
    align-items: flex-end;
    gap: 8px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
  }
  .save-hint {
    font-size: 17px;
    letter-spacing: 2.8px;
    text-transform: uppercase;
    color: var(--teal);
    display: inline-flex;
    align-items: center;
    gap: 12px;
  }
  .brand-url {
    font-size: 15px;
    letter-spacing: 1.6px;
    color: rgba(255,255,255,0.6);
  }

  /* --- character (bottom-right, mirrors cover) --- */
  .character-area {
    position: absolute;
    right: -10px;
    bottom: 80px;
    width: 380px;
    z-index: 4;
    pointer-events: none;
  }
  .character-area img {
    width: 100%;
    height: auto;
    filter: drop-shadow(0 12px 32px rgba(2,19,42,0.45));
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="glow"></div>
  <div class="stripe-left"></div>
  <div class="accent-bar"></div>

  <div class="content">
    <div class="header">
      <div class="eyebrow">Final · te toca</div>
      <div class="slide-counter"><strong>{{slide_number_padded}}</strong> / {{total_slides_padded}}</div>
    </div>

    <div class="cta-area">
      <h2 class="cta-headline">{{slot.cta_headline}}</h2>
      <!-- if:slot.cta_subtext -->
      <p class="cta-subtext">{{slot.cta_subtext}}</p>
      <!-- /if:slot.cta_subtext -->
      <!-- if:slot.cta_button -->
      <span class="cta-button">{{slot.cta_button}} <span class="arrow">→</span></span>
      <!-- /if:slot.cta_button -->
    </div>

    <div class="end-mark">Fin · {{slide_number_padded}} / {{total_slides_padded}}</div>

    <div class="footer">
      <div class="brand-logo">Growth<span class="four-u">4U</span></div>
      <div class="footer-meta">
        <div class="save-hint">Guarda · Comparte</div>
        <div class="brand-url">growth4u.io</div>
      </div>
    </div>
  </div>

  <!-- if:slot.cta_image_url -->
  <div class="character-area">
    <img src="{{slot.cta_image_url|attr}}" alt="" />
  </div>
  <!-- /if:slot.cta_image_url -->
</div>
</body>
</html>
