<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide CTA — {{brand.name}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    font-family: 'Roboto', sans-serif;
    color: #FFFFFF;
  }

  .canvas {
    width: 1080px;
    height: 1350px;
    position: relative;
    background: linear-gradient(160deg, #032149 0%, #1a3690 35%, #0faec1 100%);
    overflow: hidden;
  }

  .bokeh { position: absolute; border-radius: 50%; filter: blur(70px); opacity: 0.35; pointer-events: none; }
  .bokeh-1 { width: 380px; height: 380px; background: #6351d5; top: -80px; left: -60px; }
  .bokeh-2 { width: 300px; height: 300px; background: #0faec1; bottom: 300px; right: -80px; }
  .bokeh-3 { width: 220px; height: 220px; background: #45b6f7; bottom: 15%; left: 30%; opacity: 0.2; }

  .stripe-left {
    position: absolute; left: 0; top: 0;
    width: 8px; height: 100%;
    background: linear-gradient(180deg, #0faec1, #3f45fe, #6351d5);
    z-index: 10;
  }

  .accent-bar {
    position: absolute; bottom: 0; left: 0;
    width: 100%; height: 10px;
    background: linear-gradient(90deg, #0faec1, #1a3690, #6351d5);
    z-index: 10;
  }

  .content {
    position: relative; z-index: 5;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%;
    padding: 64px 80px 80px;
    text-align: center;
  }

  .slide-counter {
    position: absolute; top: 64px; left: 80px;
    font-family: 'Manrope', sans-serif;
    font-weight: 700; font-size: 16px;
    color: rgba(255,255,255,0.4);
  }

  .cta-headline {
    font-family: 'Manrope', sans-serif;
    font-weight: 800; font-size: 48px;
    line-height: 1.15; letter-spacing: -1.5px;
    color: #FFFFFF;
    text-shadow: 0 2px 8px rgba(3, 33, 73, 0.6);
    max-width: 750px;
    margin-bottom: 24px;
  }

  .cta-subtext {
    font-family: 'Roboto', sans-serif;
    font-weight: 400; font-size: 22px;
    color: rgba(255,255,255,0.75);
    max-width: 600px;
    margin-bottom: 48px;
  }

  .cta-button {
    display: inline-block;
    font-family: 'Manrope', sans-serif;
    font-weight: 700; font-size: 22px;
    color: #032149;
    background: #0faec1;
    padding: 18px 48px;
    border-radius: 30px;
    box-shadow: 0 4px 20px rgba(15, 174, 193, 0.3);
    text-decoration: none;
  }

  .character-area {
    position: absolute;
    bottom: 100px; right: 60px;
    width: 320px; z-index: 4;
    pointer-events: none;
  }
  .character-area img {
    width: 100%; height: auto;
    filter: drop-shadow(-12px 12px 0 rgba(2,19,42,0.45));
  }

  .footer {
    position: absolute; bottom: 32px; left: 80px; right: 80px;
    z-index: 6; padding-top: 24px;
    border-top: 1.5px solid rgba(255,255,255,0.18);
    display: flex; align-items: center; justify-content: space-between;
  }

  .brand-logo {
    font-family: 'Manrope', sans-serif;
    font-weight: 800; font-size: 28px; color: #FFFFFF;
  }
  .brand-logo .four-u {
    background: linear-gradient(90deg, #0faec1, #3f45fe, #6351d5);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .brand-url {
    font-family: 'Roboto', sans-serif;
    font-weight: 400; font-size: 14px;
    color: rgba(255,255,255,0.5);
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="bokeh bokeh-1"></div>
  <div class="bokeh bokeh-2"></div>
  <div class="bokeh bokeh-3"></div>
  <div class="stripe-left"></div>
  <div class="accent-bar"></div>

  <div class="content">
    <div class="slide-counter">{{slide_number_padded}} / {{total_slides}}</div>

    <div class="cta-headline">{{slot.cta_headline}}</div>

    <!-- if:slot.cta_subtext -->
    <div class="cta-subtext">{{slot.cta_subtext}}</div>
    <!-- /if:slot.cta_subtext -->

    <div class="cta-button">{{slot.cta_button}}</div>
  </div>

  <!-- if:slot.cta_image_url -->
  <div class="character-area">
    <img src="{{slot.cta_image_url|attr}}" alt="" />
  </div>
  <!-- /if:slot.cta_image_url -->

  <div class="footer">
    <div class="brand-logo">Growth<span class="four-u">4U</span></div>
    <div class="brand-url">growth4u.io</div>
  </div>
</div>
</body>
</html>
