<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide Quote — {{brand.name}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Roboto:wght@400;500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --navy:    #032149;
    --teal:    #0faec1;
    --electric:#3f45fe;
    --purple:  #6351d5;
    --body:    #475569;
    --muted:   #94a3b8;
    --bg:      #f8f9fb;
    --grad-stripe: linear-gradient(180deg, #0faec1, #3f45fe, #6351d5);
    --grad-accent: linear-gradient(90deg, #0faec1, #1a3690, #6351d5);
    --grad-logo:   linear-gradient(90deg, #0faec1, #3f45fe, #6351d5);
  }

  body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    font-family: 'Roboto', sans-serif;
    color: var(--navy);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .canvas {
    width: 1080px;
    height: 1350px;
    position: relative;
    background: #ffffff;
    overflow: hidden;
    isolation: isolate;
  }

  /* huge teal quotation mark — the single decisive flourish */
  .quote-glyph {
    position: absolute;
    top: 96px;
    left: 80px;
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 480px;
    line-height: 0.8;
    color: var(--teal);
    opacity: 0.14;
    pointer-events: none;
    z-index: 1;
    user-select: none;
  }

  .stripe-left {
    position: absolute; left: 0; top: 0;
    width: 6px; height: 100%;
    background: var(--grad-stripe);
    z-index: 12;
  }
  .accent-bar {
    position: absolute; bottom: 0; left: 0;
    width: 100%; height: 8px;
    background: var(--grad-accent);
    z-index: 12;
  }

  .content {
    position: relative; z-index: 5;
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100%;
    padding: 72px 80px 88px;
  }

  /* --- header (matches body slides) --- */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 24px;
    border-bottom: 1.5px solid rgba(3,33,73,0.08);
  }
  .slide-counter {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-weight: 500;
    font-size: 17px;
    letter-spacing: 2.8px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .slide-counter strong {
    color: var(--teal);
    font-weight: 500;
  }
  .brand-logo-sm {
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 26px;
    color: var(--navy);
    letter-spacing: -0.4px;
  }
  .brand-logo-sm .four-u {
    background: var(--grad-logo);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  /* --- quote body --- */
  .quote-area {
    align-self: center;
    display: flex; flex-direction: column;
    gap: 56px;
    max-width: 880px;
    z-index: 6;
  }

  .quote-text {
    font-family: 'Manrope', sans-serif;
    font-weight: 700;
    font-size: 80px;
    line-height: 1.14;
    letter-spacing: -1.8px;
    color: var(--navy);
    text-wrap: balance;
  }
  .quote-text em {
    font-style: normal;
    color: var(--teal);
    background: linear-gradient(to top, rgba(15,174,193,0.18) 0%, rgba(15,174,193,0.18) 30%, transparent 30%);
    padding: 0 4px;
  }

  .attribution {
    display: grid;
    grid-template-columns: auto 1fr;
    column-gap: 24px;
    align-items: center;
    padding-top: 24px;
    border-top: 1.5px solid rgba(3,33,73,0.1);
    max-width: 640px;
  }
  .attr-rule {
    width: 56px; height: 2px;
    background: var(--teal);
  }
  .attr-stack {
    display: flex; flex-direction: column;
    gap: 4px;
  }
  .attr-name {
    font-family: 'Manrope', sans-serif;
    font-weight: 700;
    font-size: 28px;
    line-height: 1.25;
    color: var(--navy);
    letter-spacing: -0.2px;
  }
  .attr-role {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-weight: 500;
    font-size: 16px;
    line-height: 1.4;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: var(--body);
  }

  /* --- footer (matches body slides) --- */
  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 24px;
    border-top: 1.5px solid rgba(3,33,73,0.08);
  }
  .footer-url {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-weight: 500;
    font-size: 16px;
    letter-spacing: 1.6px;
    color: var(--muted);
  }
  .footer-swipe {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-weight: 500;
    font-size: 16px;
    letter-spacing: 2.2px;
    color: var(--teal);
    text-transform: uppercase;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="quote-glyph" aria-hidden="true">“</div>
  <div class="stripe-left"></div>
  <div class="accent-bar"></div>

  <div class="content">
    <div class="header">
      <div class="slide-counter"><strong>{{slide_number_padded}}</strong> / {{total_slides_padded}}</div>
      <div class="brand-logo-sm">Growth<span class="four-u">4U</span></div>
    </div>

    <div class="quote-area">
      <p class="quote-text">{{per_slide.slide_quote_text}}</p>

      <!-- if:per_slide.slide_quote_author_name -->
      <div class="attribution">
        <div class="attr-rule"></div>
        <div class="attr-stack">
          <div class="attr-name">{{per_slide.slide_quote_author_name}}</div>
          <!-- if:per_slide.slide_quote_author_role -->
          <div class="attr-role">{{per_slide.slide_quote_author_role}}</div>
          <!-- /if:per_slide.slide_quote_author_role -->
        </div>
      </div>
      <!-- /if:per_slide.slide_quote_author_name -->
    </div>

    <div class="footer">
      <div class="footer-url">growth4u.io</div>
      <div class="footer-swipe">Sigue →</div>
    </div>
  </div>
</div>
</body>
</html>
