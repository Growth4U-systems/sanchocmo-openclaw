<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    width: 1080px;
    height: 1350px;
    font-family: 'Manrope', sans-serif;
    overflow: hidden;
    position: relative;
    /* Gradient background matching the LinkedIn template */
    background: linear-gradient(160deg, #032149 0%, #1a3690 35%, #0faec1 100%);
  }
  
  /* Floating brand elements - decorative */
  .float-element {
    position: absolute;
    border-radius: 50%;
    opacity: 0.12;
  }
  .float-1 {
    width: 180px; height: 180px;
    background: #0faec1;
    top: -40px; right: -30px;
  }
  .float-2 {
    width: 120px; height: 120px;
    background: #6351d5;
    bottom: 80px; right: -20px;
  }
  .float-3 {
    width: 90px; height: 90px;
    background: #0faec1;
    bottom: -20px; left: 60px;
  }
  .float-4 {
    width: 60px; height: 60px;
    background: #45b6f7;
    top: 300px; right: 40px;
  }
  
  /* Pill shapes like brandbook */
  .pill {
    position: absolute;
    border-radius: 30px;
    opacity: 0.08;
  }
  .pill-1 {
    width: 200px; height: 48px;
    background: #0faec1;
    transform: rotate(-15deg);
    top: 180px; right: -60px;
  }
  .pill-2 {
    width: 160px; height: 40px;
    background: #6351d5;
    transform: rotate(20deg);
    bottom: 250px; left: -40px;
  }
  
  /* Dot grid pattern */
  .dot-grid {
    position: absolute;
    top: 420px;
    left: 60px;
    display: grid;
    grid-template-columns: repeat(4, 8px);
    gap: 12px;
    opacity: 0.15;
  }
  .dot-grid .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #0faec1;
  }
  
  .container {
    position: relative;
    z-index: 5;
    width: 100%;
    height: 100%;
    padding: 64px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  
  /* Top: author section */
  .author-section {
    display: flex;
    align-items: center;
    gap: 24px;
  }
  
  .avatar-frame {
    width: 96px;
    height: 96px;
    border-radius: 16px;
    overflow: hidden;
    border: 3px solid rgba(15, 174, 193, 0.5);
    background: #032149;
    flex-shrink: 0;
  }
  .avatar-frame img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    /* invert for white lines on the gradient bg */
  }
  
  .author-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .author-name {
    font-weight: 800;
    font-size: 28px;
    color: #FFFFFF;
  }
  .author-role {
    font-weight: 500;
    font-size: 18px;
    color: rgba(255,255,255,0.6);
  }
  
  /* Quote section */
  .quote-section {
    position: relative;
    background: rgba(3, 33, 73, 0.45);
    border: 1px solid rgba(15, 174, 193, 0.2);
    border-radius: 24px;
    padding: 56px 52px;
    backdrop-filter: blur(10px);
  }
  
  .quote-marks {
    position: absolute;
    top: -20px;
    right: 48px;
    font-size: 120px;
    font-weight: 800;
    color: #0faec1;
    opacity: 0.5;
    line-height: 1;
    font-family: Georgia, serif;
  }
  
  .quote-text {
    font-weight: 700;
    font-size: 48px;
    line-height: 1.25;
    color: #FFFFFF;
    position: relative;
    z-index: 2;
  }
  .quote-text .highlight {
    color: #0faec1;
    font-weight: 800;
  }
  
  /* Bottom: tagline + branding */
  .bottom-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  
  .divider-line {
    width: 80px;
    height: 3px;
    background: #0faec1;
    border-radius: 2px;
  }
  
  .tagline {
    font-weight: 500;
    font-size: 22px;
    color: rgba(255,255,255,0.6);
    text-align: center;
  }
  .tagline .teal { color: #0faec1; }
  
  .logo-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-text {
    font-weight: 800;
    font-size: 24px;
    color: white;
  }
  .logo-text .gradient-4u {
    background: linear-gradient(90deg, #0faec1, #3f45fe, #6351d5);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  
  /* Purple badge element like the original */
  .badge {
    position: absolute;
    bottom: 200px;
    right: 48px;
    width: 72px;
    height: 72px;
    background: linear-gradient(135deg, #6351d5, #3f45fe);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 24px rgba(99,81,213,0.4);
    z-index: 6;
  }
  .badge-inner {
    width: 56px;
    height: 56px;
    border: 2.5px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 800;
    font-size: 22px;
  }
</style>
</head>
<body>
  <!-- Floating elements -->
  <div class="float-element float-1"></div>
  <div class="float-element float-2"></div>
  <div class="float-element float-3"></div>
  <div class="float-element float-4"></div>
  <div class="pill pill-1"></div>
  <div class="pill pill-2"></div>
  
  <!-- Dot grid -->
  <div class="dot-grid">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
  
  <div class="container">
    <div class="author-section">
      <div class="avatar-frame">
        <img src="alfonso-ref-dark.png" alt="Alfonso">
      </div>
      <div class="author-info">
        <span class="author-name">Alfonso Sainz</span>
        <span class="author-role">CEO & Founder en Growth4U</span>
      </div>
    </div>
    
    <div class="quote-section">
      <div class="quote-marks">"</div>
      <p class="quote-text">A veces <span class="highlight">decir que no a 50K</span> es la única forma de proteger lo que te permite <span class="highlight">facturar otros 50K</span> en el futuro.</p>
    </div>
    
    <div class="bottom-section">
      <div class="divider-line"></div>
      <p class="tagline">Transformamos el <span class="teal">growth</span> en un sistema que funciona incluso cuando tú duermes</p>
      <div class="logo-row">
        <span class="logo-text">Growth<span class="gradient-4u">4U</span></span>
      </div>
    </div>
  </div>
  
  <div class="badge">
    <div class="badge-inner">G4U</div>
  </div>
</body>
</html>
