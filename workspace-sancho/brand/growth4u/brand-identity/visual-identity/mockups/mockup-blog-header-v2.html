<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    width: 1200px;
    height: 630px;
    background: #032149;
    font-family: 'Inter', sans-serif;
    color: white;
    overflow: hidden;
    position: relative;
  }
  
  /* Top gradient bar */
  .top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(90deg, #3f45fe, #0faec1, #f59e0b);
    z-index: 10;
  }
  
  /* Background scene illustration as texture */
  .bg-scene {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0.06;
  }
  .bg-scene img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  
  /* Character on the left, large */
  .character {
    position: absolute;
    left: -20px;
    bottom: 0;
    width: 380px;
    height: 100%;
    z-index: 3;
    display: flex;
    align-items: flex-end;
  }
  .character img {
    width: 100%;
    object-fit: contain;
    object-position: bottom center;
    filter: brightness(0) invert(1);
    opacity: 0.85;
  }
  
  /* Fade from character to content */
  .char-fade {
    position: absolute;
    left: 280px;
    top: 0;
    width: 150px;
    height: 100%;
    background: linear-gradient(90deg, transparent, #032149);
    z-index: 4;
  }
  
  /* Content */
  .content {
    position: relative;
    z-index: 5;
    margin-left: 380px;
    padding: 48px 56px 48px 40px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .logo {
    font-weight: 900;
    font-size: 22px;
    color: white;
  }
  .logo span { color: #0faec1; }
  
  .category {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #f59e0b;
    text-transform: uppercase;
    letter-spacing: 2px;
    background: rgba(245, 158, 11, 0.12);
    border: 1px solid rgba(245, 158, 11, 0.25);
    padding: 6px 14px;
    border-radius: 4px;
  }
  
  .main {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  
  .title {
    font-weight: 900;
    font-size: 42px;
    line-height: 1.1;
    letter-spacing: -1.5px;
    max-width: 700px;
  }
  .title .highlight { color: #0faec1; }
  
  .subtitle {
    font-weight: 400;
    font-size: 18px;
    line-height: 1.5;
    color: rgba(255,255,255,0.55);
    max-width: 600px;
  }
  
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  
  .meta {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .author-name {
    font-weight: 600;
    font-size: 16px;
  }
  .reading {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: rgba(255,255,255,0.35);
  }
  
  .stat-badge {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 20px;
    color: #f59e0b;
    background: rgba(245, 158, 11, 0.1);
    border: 1.5px solid rgba(245, 158, 11, 0.25);
    padding: 10px 20px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .stat-badge .label {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="top-bar"></div>
  
  <div class="bg-scene">
    <img src="alfonso-unit-economics-scene.png" alt="">
  </div>
  
  <div class="character">
    <img src="../alfonso-character-final.png" alt="Alfonso">
  </div>
  <div class="char-fade"></div>
  
  <div class="content">
    <div class="header">
      <div class="logo">Growth<span>4U</span></div>
      <div class="category">📊 Growth</div>
    </div>
    
    <div class="main">
      <h1 class="title">Unit Economics para Fintech: <span class="highlight">CAC, LTV y Payback</span></h1>
      <p class="subtitle">Cómo medirlos bien y qué hacer cuando fallan. El 90% de las fintechs los calcula mal.</p>
    </div>
    
    <div class="footer">
      <div class="meta">
        <span class="author-name">Alfonso Sainz de Baranda</span>
        <span class="reading">8 min lectura · 25 feb 2026</span>
      </div>
      <div class="stat-badge">
        90% <span class="label">calculan mal el CAC</span>
      </div>
    </div>
  </div>
</body>
</html>
