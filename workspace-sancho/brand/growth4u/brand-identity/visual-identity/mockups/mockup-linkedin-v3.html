<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    width: 1080px;
    height: 1350px;
    font-family: 'Manrope', sans-serif;
    overflow: hidden;
    position: relative;
    background: #032149;
  }
  
  /* Character illustration as full background */
  .character-bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
  }
  .character-bg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }
  
  /* Logo top left */
  .logo {
    position: absolute;
    top: 48px;
    left: 56px;
    font-weight: 800;
    font-size: 44px;
    color: white;
    z-index: 10;
    text-shadow: 0 2px 12px rgba(3, 33, 73, 0.8);
  }
  .logo .g4u {
    background: linear-gradient(90deg, #0faec1, #3f45fe, #6351d5);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  
  /* Bottom gradient fade for text readability */
  .bottom-fade {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 550px;
    background: linear-gradient(180deg, transparent 0%, rgba(3, 33, 73, 0.92) 40%, rgba(3, 33, 73, 1) 70%);
    z-index: 5;
  }
  
  /* Quote content over the fade */
  .quote-content {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 0 64px 56px;
    z-index: 10;
  }
  
  .quote-text {
    font-weight: 800;
    font-size: 54px;
    line-height: 1.2;
    color: #FFFFFF;
    margin-bottom: 36px;
    text-shadow: 0 2px 8px rgba(3, 33, 73, 0.6);
  }
  .quote-text .highlight {
    color: #0faec1;
  }
  
  .author-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .author-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .author-name {
    font-weight: 800;
    font-size: 30px;
    color: white;
  }
  .author-role {
    font-weight: 500;
    font-size: 22px;
    color: rgba(255,255,255,0.5);
  }
  .url-tag {
    font-weight: 600;
    font-size: 22px;
    color: #0faec1;
    border: 2px solid rgba(15, 174, 193, 0.4);
    padding: 12px 28px;
    border-radius: 8px;
  }
</style>
</head>
<body>
  <div class="character-bg">
    <img src="alfonso-gradient-integrated.png" alt="Alfonso">
  </div>
  
  <span class="logo">Growth<span class="g4u">4U</span></span>
  
  <div class="bottom-fade"></div>
  
  <div class="quote-content">
    <p class="quote-text">A veces <span class="highlight">decir que no a 50K</span> es la única forma de proteger lo que te permite <span class="highlight">facturar otros 50K</span> en el futuro.</p>
    <div class="author-row">
      <div class="author-info">
        <span class="author-name">Alfonso Sainz de Baranda</span>
        <span class="author-role">CEO & Founder · Growth4U</span>
      </div>
      <span class="url-tag">growth4u.io</span>
    </div>
  </div>
</body>
</html>
