<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    width: 1080px;
    height: 1080px;
    background: #032149;
    font-family: 'Inter', sans-serif;
    color: white;
    overflow: hidden;
    position: relative;
  }
  
  .container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: row;
    position: relative;
  }
  
  /* Photo takes right 45% */
  .photo-panel {
    position: absolute;
    right: 0;
    top: 0;
    width: 50%;
    height: 100%;
    overflow: hidden;
  }
  
  .photo-panel img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }
  
  /* Gradient fade from dark to photo */
  .photo-fade {
    position: absolute;
    top: 0;
    left: 0;
    width: 50%;
    height: 100%;
    background: linear-gradient(90deg, #032149 0%, #032149 20%, transparent 100%);
    z-index: 2;
  }
  
  .photo-fade-bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 25%;
    background: linear-gradient(0deg, #032149 0%, transparent 100%);
    z-index: 2;
  }
  
  .photo-fade-top {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 25%;
    background: linear-gradient(180deg, #032149 0%, transparent 100%);
    z-index: 2;
  }
  
  /* Content overlays photo */
  .content {
    position: relative;
    z-index: 3;
    width: 100%;
    height: 100%;
    padding: 64px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .logo {
    font-weight: 900;
    font-size: 26px;
    color: #3f45fe;
  }
  
  .topic-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: #f59e0b;
    background: rgba(249, 115, 22, 0.12);
    border: 1px solid rgba(249, 115, 22, 0.25);
    padding: 6px 16px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }
  
  .quote-section {
    max-width: 680px;
  }
  
  .quote-text {
    font-weight: 800;
    font-size: 44px;
    line-height: 1.2;
    letter-spacing: -1.5px;
    color: #F8FAFC;
    margin-bottom: 24px;
  }
  
  .quote-text .highlight {
    color: #f59e0b;
  }
  
  .quote-sub {
    font-weight: 400;
    font-size: 20px;
    line-height: 1.6;
    color: #94A3B8;
    max-width: 520px;
  }
  
  .bottom-bar {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  
  .author-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  
  .author-name {
    font-weight: 700;
    font-size: 20px;
    color: #F8FAFC;
  }
  
  .author-title {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    font-size: 14px;
    color: #64748B;
  }
  
  .cta-url {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    color: #3f45fe;
    border: 1.5px solid rgba(37, 99, 235, 0.4);
    padding: 10px 20px;
    border-radius: 6px;
    letter-spacing: 0.5px;
  }
  
  /* Accent line */
  .accent-line {
    position: absolute;
    left: 64px;
    top: 180px;
    width: 4px;
    height: 80px;
    background: linear-gradient(180deg, #f59e0b, #3f45fe);
    border-radius: 2px;
    z-index: 4;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="photo-panel">
      <img src="style-D-line-art.png" alt="Alfonso">
      <div class="photo-fade"></div>
      <div class="photo-fade-bottom"></div>
      <div class="photo-fade-top"></div>
    </div>
    
    <div class="content">
      <div class="top-bar">
        <div class="logo">Growth4U</div>
        <div class="topic-tag">growth · opinión</div>
      </div>
      
      <div class="quote-section">
        <h1 class="quote-text">
          He dicho que no a proyectos de <span class="highlight">50K</span> porque sé que no les voy a poder dar resultados.
        </h1>
        <p class="quote-sub">Prefiero perder dinero hoy que perder reputación para siempre. En growth, la confianza es el único activo que escala.</p>
      </div>
      
      <div class="bottom-bar">
        <div class="author-info">
          <span class="author-name">Alfonso Sainz de Baranda</span>
          <span class="author-title">Founder & CEO · Growth4U</span>
        </div>
        <div class="cta-url">growth4u.io →</div>
      </div>
    </div>
  </div>
  
  <div class="accent-line"></div>
</body>
</html>
