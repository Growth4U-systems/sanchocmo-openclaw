# News Prompts — P2: Adquisicion Multi-Canal y Confianza
# Dynamic prompt that generates different searches each day.
# Tool: Brave Search API / Perplexity
# Frequency: daily 7am

pillar_id: P2
pillar_name: "Adquisicion Multi-Canal y Confianza"

prompt: >
  What are the 5 most interesting, innovative and relevant news stories
  from the last 48 hours covering GEO (Generative Engine Optimization), AI search visibility (ChatGPT, Gemini, Perplexity), multi-channel acquisition strategies, trust-based marketing, LinkedIn organic reach, cold email deliverability, and attribution models for B2B?
