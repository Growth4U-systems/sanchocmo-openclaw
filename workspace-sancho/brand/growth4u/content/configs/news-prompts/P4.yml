pillar_id: P4
pillar_name: El Modelo Agencia Esta Roto
prompt: |
  What are the 5 most interesting, innovative and relevant news stories from the last 48 hours covering marketing agency
  model disruption, fractional CMO trends, in-house vs agency debate, agency accountability and transparency,
  bait-and-switch practices, and the rise of embedded growth consultants?

  For each story return:
  - headline (exact, as published)
  - source (publication name + author if available)
  - date (publication date in YYYY-MM-DD format)
  - url
  - a detailed summary of 5-7 sentences covering, in this order:
    (1) WHAT HAPPENED — the actual fact/event with named agencies, brands, or fractional CMOs involved
    (2) KEY DATA — specific numbers, percentages, contract sizes, retainers cited, or direct quotes
    (3) WHY IT MATTERS for a B2B growth consultant who positions against the broken agency model — be specific
        about the angle this gives us (e.g. "validates our exit-date positioning because…")
    (4) CONCRETE EXAMPLES mentioned (agencies that lost clients, brands that went in-house, etc.)

  Avoid: vague claims, generic "industry insights" language, and recycled mainstream takes.
  Prioritize underground/niche sources (operator newsletters, in-house marketer blogs, ex-agency-founder
  podcasts, Reddit threads with specifics) over big tech press.
sector: B2B SaaS growth consulting
language:
  - es
  - en
