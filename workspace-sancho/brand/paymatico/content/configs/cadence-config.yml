# Cadence Config — Paymatico Editorial Dispatch
# Defines how many content slots per day of the week

cadence:
  monday: 0
  tuesday: 1
  wednesday: 1
  thursday: 1
  friday: 1
  saturday: 0
  sunday: 0

# Max candidates per dispatch (top N by score)
max_candidates_per_dispatch: 5

# Content types and their target channels
channels:
  linkedin:
    types: ["Hot Take", "Contrarian Take", "Proof Post", "Listicle"]
    frequency: "3-4x/week"
  blog:
    types: ["Framework", "Deep Dive"]
    frequency: "1x/week"
