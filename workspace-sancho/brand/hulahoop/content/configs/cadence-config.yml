# Cadence Config — Hulahoop
# Defines editorial dispatch cadence

cadence:
  frequency: daily
  days: [mon, tue, wed, thu, fri]  # weekdays only
  slots_per_day: 5
  max_ideas_per_dispatch: 5
  min_pov_confidence: 0.7
  
pillar_distribution:
  # Target mix per dispatch (soft guideline)
  financiacion-entretenimiento: 1-2
  pfp-regulacion: 1-2
  incentivos-fiscales: 1
  tokenizacion-rwa: 1

content_type_variety:
  # Aim for mix of types per dispatch
  preferred_mix: [Hot Take, Proof Post, Framework]
